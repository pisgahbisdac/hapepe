<!DOCTYPE html>
<html lang="id" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Butcher Catalog - Premium Cuts</title>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            butcher: {
              50: '#fcf3f3',
              100: '#f9e4e4',
              500: '#e53e3e',
              600: '#c53030',
              900: '#742a2a',
            }
          }
        }
      }
    }
  </script>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; }
    .glass-nav {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .dark .glass-nav {
      background: rgba(15, 23, 42, 0.8);
    }
    .animate-fade-in { animation: fadeIn 0.8s ease-out; }
    .animate-slide-up { animation: slideUp 0.6s ease-out; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 transition-colors duration-300">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const API_URL = 'https://script.google.com/macros/s/AKfycbwLLywyEdvDZhKajLmbpN8ZeFTeYkB5DRc3umPpdquRMekRnqc9ZSb2YBNguumBfXvb/exec';

    function App() {
      const [items, setItems] = useState([]);
      const [isLoading, setIsLoading] = useState(true);
      const [isDarkMode, setIsDarkMode] = useState(false);
      const [searchQuery, setSearchQuery] = useState('');

      useEffect(() => {
        // Load preference
        const savedTheme = localStorage.getItem('butcher-theme');
        if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          setIsDarkMode(true);
          document.documentElement.classList.add('dark');
        } else {
          setIsDarkMode(false);
          document.documentElement.classList.remove('dark');
        }

        // Fetch data
        fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'getPublicButcher' })
        })
        .then(res => res.json())
        .then(res => {
          if (res.status === 'success') {
            setItems(res.data || []);
          }
        })
        .catch(err => console.error(err))
        .finally(() => setIsLoading(false));
      }, []);

      const toggleTheme = () => {
        if (isDarkMode) {
          document.documentElement.classList.remove('dark');
          localStorage.setItem('butcher-theme', 'light');
          setIsDarkMode(false);
        } else {
          document.documentElement.classList.add('dark');
          localStorage.setItem('butcher-theme', 'dark');
          setIsDarkMode(true);
        }
      };

      const filteredItems = items.filter(item => item.itemName.toLowerCase().includes(searchQuery.toLowerCase()));

      return (
        <div className="min-h-screen flex flex-col">
          {/* Navigation */}
          <nav className="glass-nav fixed top-0 w-full z-50 border-b border-slate-200 dark:border-slate-800 transition-colors duration-300">
            <div className="max-w-[1600px] mx-auto px-4 sm:px-6 lg:px-8">
              <div className="flex justify-between items-center h-16">
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 bg-butcher-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-butcher-600/30">
                    <i className="fas fa-drumstick-bite text-xl"></i>
                  </div>
                  <h1 className="text-xl font-extrabold tracking-tight">Premium<span className="text-butcher-600">Butcher</span></h1>
                </div>
                <div>
                  <button onClick={toggleTheme} className="w-10 h-10 rounded-full flex items-center justify-center bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
                    <i className={`fas ${isDarkMode ? 'fa-sun' : 'fa-moon'}`}></i>
                  </button>
                </div>
              </div>
            </div>
          </nav>

          {/* Hero Section */}
          <div className="pt-24 pb-12 px-4 sm:px-6 lg:px-8 bg-gradient-to-b from-butcher-50 to-slate-50 dark:from-slate-900/50 dark:to-slate-900 transition-colors duration-300">
            <div className="max-w-[1600px] mx-auto text-center animate-slide-up">
              <h2 className="text-3xl md:text-5xl font-black mb-4 leading-tight">
                Katalog Potongan <span className="text-butcher-600">Terbaik</span>
              </h2>
              <p className="text-slate-500 dark:text-slate-400 max-w-2xl mx-auto text-lg mb-8">
                Jelajahi panduan bahan dan potongan daging profesional kami. Panduan ini dirancang untuk memastikan konsistensi berat dan standar operasional dapur Anda.
              </p>
              
              <div className="max-w-md mx-auto relative">
                <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                  <i className="fas fa-search text-slate-400"></i>
                </div>
                <input 
                  type="text" 
                  placeholder="Cari jenis bahan..." 
                  className="w-full pl-11 pr-4 py-4 rounded-2xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 focus:outline-none focus:ring-2 focus:ring-butcher-500 shadow-xl shadow-slate-200/50 dark:shadow-none text-slate-800 dark:text-white transition-all"
                  value={searchQuery}
                  onChange={(e) => setSearchQuery(e.target.value)}
                />
              </div>
            </div>
          </div>

          {/* Main Content */}
          <main className="flex-grow max-w-[1600px] mx-auto px-4 sm:px-6 lg:px-8 py-12 w-full">
            {isLoading ? (
              <div className="flex flex-col items-center justify-center py-20">
                <i className="fas fa-circle-notch fa-spin text-5xl text-butcher-600 mb-4"></i>
                <p className="text-slate-500 dark:text-slate-400 font-medium animate-pulse">Menyiapkan Katalog...</p>
              </div>
            ) : filteredItems.length > 0 ? (
              <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-8">
                {filteredItems.map((item, index) => (
                  <div key={item.id} className="bg-white dark:bg-slate-800 rounded-3xl overflow-hidden shadow-sm hover:shadow-2xl transition-all duration-300 border border-slate-100 dark:border-slate-700/50 group animate-slide-up" style={{ animationDelay: `${index * 50}ms` }}>
                    <div className="relative aspect-square overflow-hidden bg-slate-100 dark:bg-slate-900">
                      {item.imageUrl ? (
                        <img 
                          src={item.imageUrl} 
                          alt={item.itemName} 
                          className="w-full h-full object-cover transform group-hover:scale-110 transition-transform duration-700" 
                        />
                      ) : (
                        <div className="w-full h-full flex flex-col items-center justify-center text-slate-300 dark:text-slate-700">
                          <i className="fas fa-image text-5xl mb-2"></i>
                          <span className="text-sm font-medium">No Image</span>
                        </div>
                      )}
                      <div className="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                    </div>
                    <div className="p-6 relative">
                      <div className="absolute -top-6 right-6 bg-butcher-600 text-white shadow-lg shadow-butcher-600/40 px-4 py-2 rounded-full font-bold text-sm flex items-center gap-2 transform group-hover:-translate-y-1 transition-transform">
                        <i className="fas fa-weight-hanging"></i> {item.netWeight}
                      </div>
                      <h3 className="text-xl font-bold mt-2 text-slate-800 dark:text-white line-clamp-2">{item.itemName}</h3>
                      <p className="text-sm text-slate-500 dark:text-slate-400 mt-2 font-medium">Bahan Baku & Potongan</p>
                    </div>
                  </div>
                ))}
              </div>
            ) : (
              <div className="text-center py-20">
                <div className="w-24 h-24 bg-slate-100 dark:bg-slate-800 rounded-full flex items-center justify-center mx-auto mb-4 text-slate-400 dark:text-slate-500">
                  <i className="fas fa-search text-3xl"></i>
                </div>
                <h3 className="text-xl font-bold text-slate-700 dark:text-slate-300 mb-2">Tidak ada hasil</h3>
                <p className="text-slate-500 dark:text-slate-400">Kami tidak menemukan bahan yang cocok dengan pencarian Anda.</p>
              </div>
            )}
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
