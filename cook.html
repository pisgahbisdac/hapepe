<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Katalog Dapur - FoodCost Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    Babel.registerPreset('react-classic', {
      presets: [
        [Babel.availablePresets.react, { runtime: 'classic' }]
      ]
    });
  </script>
</head>
<body class="bg-stone-50 text-slate-800 font-sans antialiased">
  <div id="root"></div>
  <script type="text/babel" data-presets="react-classic">
    const { useState, useEffect } = React;
    const API_URL = 'https://script.google.com/macros/s/AKfycbwLLywyEdvDZhKajLmbpN8ZeFTeYkB5DRc3umPpdquRMekRnqc9ZSb2YBNguumBfXvb/exec';

    function CookApp() {
      const [recipes, setRecipes] = useState([]);
      const [searchKatalog, setSearchKatalog] = useState('');
      const [selectedKatalogMenu, setSelectedKatalogMenu] = useState(null);
      const [isLoading, setIsLoading] = useState(true);

      useEffect(() => {
        fetchRecipes();
      }, []);

      const fetchRecipes = async () => {
        setIsLoading(true);
        try {
          const response = await fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'getPublicRecipes' })
          });
          const result = await response.json();
          if (result.status === 'success') {
            setRecipes(result.data.recipes);
          } else {
            alert('Gagal mengambil data resep: ' + result.message);
          }
        } catch (error) {
          alert('Terjadi kesalahan jaringan.');
        } finally {
          setIsLoading(false);
        }
      };

      const formatNum = (num) => {
        if (num === null || num === undefined) return '0';
        return Number(num).toString().replace('.', ',');
      };

      return (
        <div className="min-h-screen pb-12">
          {/* Header */}
          <header className="bg-emerald-600 text-white shadow-md sticky top-0 z-40">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
              <div className="flex justify-between items-center h-16">
                <div className="flex items-center gap-3">
                  <div className="bg-white/20 p-2 rounded-xl backdrop-blur-sm">
                    <i className="fas fa-utensils text-xl text-white"></i>
                  </div>
                  <h1 className="text-xl font-black tracking-tight text-white drop-shadow-sm">Katalog Dapur</h1>
                </div>
                <button onClick={fetchRecipes} className="bg-white/10 hover:bg-white/20 border border-transparent transition-colors px-4 py-2 rounded-lg font-medium text-sm flex items-center gap-2">
                  <i className={`fas fa-sync-alt ${isLoading ? 'animate-spin' : ''}`}></i>
                  <span className="hidden sm:inline">Segarkan</span>
                </button>
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            {isLoading && recipes.length === 0 ? (
              <div className="flex flex-col items-center justify-center py-20">
                <i className="fas fa-circle-notch fa-spin text-5xl text-emerald-500 mb-4 drop-shadow-sm"></i>
                <p className="text-slate-500 font-medium animate-pulse">Memuat katalog resep...</p>
              </div>
            ) : (
              <div className="space-y-6">
                {/* Search Bar */}
                <div className="bg-white p-4 sm:p-6 rounded-2xl shadow-sm border border-slate-200">
                  <div className="relative">
                    <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                      <i className="fas fa-search text-slate-400"></i>
                    </div>
                    <input
                      type="text"
                      className="w-full pl-11 pr-4 py-4 bg-stone-50 border-2 border-slate-100 rounded-xl outline-none focus:border-emerald-500 font-medium text-lg text-slate-800 placeholder-slate-400 transition-colors"
                      placeholder="Cari menu untuk dimasak..."
                      value={searchKatalog}
                      onChange={(e) => setSearchKatalog(e.target.value)}
                    />
                  </div>
                </div>

                {/* Grid */}
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                  {recipes.filter(r => r.ingredients?.find(i => i.id === 'META_YIELD')?.type !== 'sub' && r.menuName.toLowerCase().includes(searchKatalog.toLowerCase())).map(recipe => (
                    <div key={recipe.id} onClick={() => setSelectedKatalogMenu(recipe)} className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden group cursor-pointer hover:shadow-lg hover:-translate-y-1 transition-all duration-300 flex flex-col">
                      {/* Image Container: Aspect Square (1:1) full width */}
                      <div className="w-full aspect-square bg-slate-100 relative overflow-hidden flex items-center justify-center shrink-0 border-b border-slate-100">
                        {recipe.imageUrl ? (
                          <img src={recipe.imageUrl} alt={recipe.menuName} className="w-full h-full object-contain group-hover:scale-105 transition-transform duration-500" onError={(e) => { e.target.style.display = 'none'; e.target.nextSibling.style.display = 'flex'; }} />
                        ) : (
                          <div className="text-slate-300 flex flex-col items-center">
                            <i className="fas fa-image text-4xl mb-2"></i>
                            <span className="text-sm font-medium">Tanpa Foto</span>
                          </div>
                        )}
                        <div className="absolute inset-0 bg-gradient-to-t from-black/70 to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-end justify-center p-4">
                          <span className="text-white font-bold text-sm bg-emerald-600/90 backdrop-blur-sm px-4 py-2 rounded-full shadow-lg border border-emerald-500/50">
                            <i className="fas fa-book-open mr-2"></i>Buka Resep
                          </span>
                        </div>
                      </div>
                      <div className="p-5 flex-1 flex flex-col">
                        <h3 className="font-black text-lg text-slate-800 mb-2 line-clamp-2 leading-tight">{recipe.menuName}</h3>
                        {recipe.instructions ? (
                           <span className="inline-flex items-center gap-1.5 text-[11px] font-bold text-emerald-700 bg-emerald-50 px-2 py-1 rounded border border-emerald-200 mb-4 w-max shadow-sm">
                             <i className="fas fa-check"></i> Resep Tersedia
                           </span>
                        ) : (
                           <span className="inline-flex items-center gap-1.5 text-[11px] font-bold text-amber-700 bg-amber-50 px-2 py-1 rounded border border-amber-200 mb-4 w-max shadow-sm">
                             <i className="fas fa-exclamation-triangle"></i> Menunggu Resep
                           </span>
                        )}
                        <div className="mt-auto pt-4 border-t border-slate-100 flex items-center justify-between text-sm text-slate-500 font-medium">
                           <span>Hasil Jadi:</span>
                           <span className="text-slate-800 font-black bg-stone-100 px-2 py-1 rounded">
                             {formatNum(recipe.ingredients?.find(i=>i.id==='META_YIELD')?.qty || 1)} {recipe.ingredients?.find(i=>i.id==='META_YIELD')?.unit || 'porsi'}
                           </span>
                        </div>
                      </div>
                    </div>
                  ))}
                  {recipes.filter(r => r.ingredients?.find(i => i.id === 'META_YIELD')?.type !== 'sub' && r.menuName.toLowerCase().includes(searchKatalog.toLowerCase())).length === 0 && !isLoading && (
                    <div className="col-span-full py-12 text-center bg-white rounded-2xl border border-slate-200">
                      <div className="bg-stone-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4 border border-slate-200">
                        <i className="fas fa-search text-3xl text-slate-400"></i>
                      </div>
                      <h3 className="text-xl font-bold text-slate-700 mb-1">Menu Tidak Ditemukan</h3>
                      <p className="text-slate-500">Coba kata kunci lain atau hubungi admin.</p>
                    </div>
                  )}
                </div>
              </div>
            )}
          </main>

          {/* Modal Rincian Resep */}
          {selectedKatalogMenu && (() => {
            const recipe = selectedKatalogMenu;
            const yieldMeta = recipe.ingredients?.find(i => i.id === 'META_YIELD') || { qty: 1, unit: 'porsi' };
            const yieldQty = yieldMeta.qty;
            const yieldUnit = yieldMeta.unit;

            return (
              <div className="fixed inset-0 z-50 flex flex-col md:flex-row bg-white animate-in slide-in-from-bottom-10 duration-300">
                  <button onClick={() => setSelectedKatalogMenu(null)} className="absolute top-4 right-4 z-50 w-12 h-12 bg-white/80 backdrop-blur-md hover:bg-slate-100 border border-slate-200 text-slate-500 hover:text-slate-800 rounded-full flex items-center justify-center transition-colors shadow-md">
                    <i className="fas fa-times text-xl"></i>
                  </button>

                  {/* Left Side: Image */}
                  <div className="w-full md:w-2/5 aspect-square md:aspect-auto md:h-full relative shrink-0 bg-slate-100 border-b md:border-b-0 md:border-r border-slate-200 flex items-center justify-center overflow-hidden">
                    {recipe.imageUrl ? (
                      <img src={recipe.imageUrl} className="w-full h-full object-contain p-2 md:p-4" />
                    ) : (
                      <div className="text-slate-300 flex flex-col items-center">
                        <i className="fas fa-utensils text-7xl mb-4"></i>
                        <span className="font-bold tracking-widest text-sm">NO IMAGE</span>
                      </div>
                    )}
                  </div>

                  {/* Right Side: Content */}
                  <div className="w-full md:w-3/5 flex-1 p-6 md:p-8 lg:p-10 flex flex-col overflow-y-auto text-slate-800">
                      
                      {/* Title */}
                      <div className="mb-8">
                         <h2 className="text-3xl md:text-4xl lg:text-5xl font-black text-slate-900 leading-tight mb-3">{recipe.menuName}</h2>
                         <div className="inline-flex items-center gap-2 text-sm font-bold text-emerald-700 bg-emerald-50 px-4 py-2 rounded-full border border-emerald-200 shadow-sm">
                           <i className="fas fa-utensils"></i> Resep untuk {formatNum(yieldQty)} {yieldUnit}
                         </div>
                      </div>

                      {(() => {
                        const isAdvanced = typeof recipe.instructions === 'object' && recipe.instructions !== null;
                        const instObj = isAdvanced ? recipe.instructions : {};
                        const oldInstStr = !isAdvanced ? recipe.instructions : '';
                        
                        // Group ingredients by category
                        const groupedIngredients = {};
                        const uncategorized = [];
                        if (recipe.ingredients) {
                          recipe.ingredients.forEach(ing => {
                            if (ing.id === 'META_YIELD') return;
                            if (ing.category) {
                              if (!groupedIngredients[ing.category]) groupedIngredients[ing.category] = [];
                              groupedIngredients[ing.category].push(ing);
                            } else {
                              uncategorized.push(ing);
                            }
                          });
                        }
                        
                        return (
                          <div className="w-full">
                            {/* Header Stats */}
                            {isAdvanced && (
                              <div className="grid grid-cols-3 border border-slate-200 bg-stone-50 rounded-xl p-4 mb-6 text-center divide-x divide-slate-200">
                                <div className="px-2">
                                  <div className="text-[10px] sm:text-xs font-bold text-slate-500 uppercase mb-1 tracking-wider">PREP TIME</div>
                                  <div className="text-base sm:text-lg font-black text-slate-900">{instObj.prepTime || '-'}</div>
                                </div>
                                <div className="px-2">
                                  <div className="text-[10px] sm:text-xs font-bold text-slate-500 uppercase mb-1 tracking-wider">COOK TIME</div>
                                  <div className="text-base sm:text-lg font-black text-slate-900">{instObj.cookTime || '-'}</div>
                                </div>
                                <div className="px-2">
                                  <div className="text-[10px] sm:text-xs font-bold text-slate-500 uppercase mb-1 tracking-wider">SERVINGS</div>
                                  <div className="text-base sm:text-lg font-black text-slate-900">{formatNum(yieldQty)}</div>
                                </div>
                              </div>
                            )}

                            {isAdvanced && instObj.tools && (
                              <div className="mb-6 text-sm flex items-start gap-2 bg-emerald-50 p-4 rounded-xl border border-emerald-100">
                                <span className="font-bold text-emerald-700 whitespace-nowrap"><i className="fas fa-tools mr-1"></i> Tools :</span>
                                <span className="font-medium text-emerald-900 leading-relaxed">{instObj.tools}</span>
                              </div>
                            )}

                            {/* Ingredient Table */}
                            <div className="mb-8">
                              <h3 className="font-bold text-lg mb-3 text-emerald-600 flex items-center gap-2"><i className="fas fa-shopping-basket"></i> Bahan Baku</h3>
                              <div className="rounded-xl overflow-hidden border border-slate-200 bg-white shadow-sm">
                                <table className="w-full text-sm">
                                  <tbody className="divide-y divide-slate-200">
                                    {Object.keys(groupedIngredients).map(cat => (
                                      <React.Fragment key={cat}>
                                        <tr className="bg-slate-50 border-b border-slate-200">
                                          <td colSpan="3" className="text-center font-bold py-2.5 uppercase text-xs tracking-widest text-emerald-800">{cat}</td>
                                        </tr>
                                        {groupedIngredients[cat].map((ing, idx) => (
                                          <tr key={idx} className="divide-x divide-slate-200 hover:bg-slate-50 transition-colors">
                                            <td className="py-2.5 px-4 font-medium text-slate-700">{ing.itemName}</td>
                                            <td className="py-2.5 px-4 w-28 text-right whitespace-nowrap text-slate-600 font-medium">{ing.netQty ? `${ing.netQty} ${ing.unit}` : `${ing.quantity} ${ing.unit}`}</td>
                                            <td className="py-2.5 px-4 w-28 whitespace-nowrap font-bold text-slate-900">{ing.measure || '-'}</td>
                                          </tr>
                                        ))}
                                      </React.Fragment>
                                    ))}
                                    {uncategorized.length > 0 && (
                                      <React.Fragment>
                                        {Object.keys(groupedIngredients).length > 0 && (
                                          <tr className="bg-slate-50 border-b border-slate-200">
                                            <td colSpan="3" className="text-center font-bold py-2.5 uppercase text-xs tracking-widest text-emerald-800">OTHERS</td>
                                          </tr>
                                        )}
                                        {uncategorized.map((ing, idx) => (
                                          <tr key={idx} className="divide-x divide-slate-200 hover:bg-slate-50 transition-colors">
                                            <td className="py-2.5 px-4 font-medium text-slate-700">{ing.itemName}</td>
                                            <td className="py-2.5 px-4 w-28 text-right whitespace-nowrap text-slate-600 font-medium">{ing.netQty ? `${ing.netQty} ${ing.unit}` : `${ing.quantity} ${ing.unit}`}</td>
                                            <td className="py-2.5 px-4 w-28 whitespace-nowrap font-bold text-slate-900">{ing.measure || '-'}</td>
                                          </tr>
                                        ))}
                                      </React.Fragment>
                                    )}
                                    {(!recipe.ingredients || recipe.ingredients.filter(i => i.id !== 'META_YIELD').length === 0) && (
                                      <tr><td colSpan="3" className="py-6 text-center italic text-slate-400">Belum ada rincian bahan</td></tr>
                                    )}
                                  </tbody>
                                </table>
                              </div>
                            </div>

                            {/* Process Table */}
                            {isAdvanced && instObj.phases && instObj.phases.length > 0 ? (
                              <div className="mb-6">
                                <h3 className="font-bold text-lg mb-3 text-rose-600 flex items-center gap-2"><i className="fas fa-fire-burner"></i> Cara Memasak</h3>
                                <div className="rounded-xl overflow-hidden border border-slate-200 bg-white shadow-sm">
                                  <table className="w-full text-sm">
                                    <thead className="bg-slate-50 border-b border-slate-200">
                                      <tr className="divide-x divide-slate-200 font-bold text-center text-[11px] sm:text-xs tracking-widest text-slate-500 uppercase">
                                        <th className="py-3 px-2 w-10">#</th>
                                        <th className="py-3 px-3">Proses</th>
                                        <th className="py-3 px-2 w-16 sm:w-20">Suhu</th>
                                        <th className="py-3 px-2 w-16 sm:w-20">Wkt</th>
                                        <th className="py-3 px-3">Catatan</th>
                                      </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-200">
                                      {instObj.phases.map((phase, pIdx) => (
                                        <React.Fragment key={pIdx}>
                                          <tr className="bg-emerald-50 border-y border-emerald-100">
                                            <td colSpan="5" className="py-2.5 px-4 font-bold text-xs uppercase text-emerald-700 tracking-wider">{phase.phase}</td>
                                          </tr>
                                          {(phase.steps || []).map((step, sIdx) => (
                                            <tr key={sIdx} className="divide-x divide-slate-200 text-center hover:bg-slate-50 transition-colors">
                                              <td className="py-3 px-2 text-xs font-black text-emerald-600">{sIdx + 1}</td>
                                              <td className="py-3 px-3 text-left font-medium text-slate-700">{step.process || '-'}</td>
                                              <td className="py-3 px-2 text-[11px] sm:text-xs font-bold text-rose-600">{step.temp || '-'}</td>
                                              <td className="py-3 px-2 text-[11px] sm:text-xs font-bold text-emerald-600">{step.time || '-'}</td>
                                              <td className="py-3 px-3 text-left text-xs text-slate-500">{step.notes || '-'}</td>
                                            </tr>
                                          ))}
                                        </React.Fragment>
                                      ))}
                                    </tbody>
                                  </table>
                                </div>
                              </div>
                            ) : (
                              oldInstStr ? (
                                <div className="mb-8">
                                  <h3 className="font-bold text-lg mb-3 text-rose-600 flex items-center gap-2"><i className="fas fa-fire-burner"></i> Cara Memasak</h3>
                                  <div className="rounded-xl border border-slate-200 bg-stone-50 p-5 whitespace-pre-line text-sm text-slate-700 leading-relaxed font-medium shadow-sm">
                                    {oldInstStr}
                                  </div>
                                </div>
                              ) : null
                            )}

                            {/* Chef Note */}
                            {isAdvanced && instObj.chefNote && (
                              <div className="text-sm bg-amber-50 border border-amber-200 p-4 rounded-xl mt-8 flex gap-3 items-start shadow-sm">
                                <i className="fas fa-exclamation-circle text-amber-500 text-xl mt-0.5"></i>
                                <div>
                                  <span className="font-black text-amber-700 block mb-1 uppercase tracking-widest text-[10px] sm:text-xs">Chef Note :</span>
                                  <span className="font-semibold text-amber-900 leading-relaxed">{instObj.chefNote}</span>
                                </div>
                              </div>
                            )}

                          </div>
                        );
                      })()}
                  </div>
              </div>
            );
          })()}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<CookApp />);
  </script>
</body>
</html>
