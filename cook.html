<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Katalog Dapur - FoodCost Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    Babel.registerPreset('react-classic', {
      presets: [
        [Babel.availablePresets.react, { runtime: 'classic' }]
      ]
    });
  </script>
</head>

<body class="bg-stone-50 text-slate-800 font-sans antialiased">
  <div id="root"></div>
  <script type="text/babel" data-presets="react-classic">
    const { useState, useEffect, useMemo } = React;
    const API_URL = 'https://script.google.com/macros/s/AKfycbwLLywyEdvDZhKajLmbpN8ZeFTeYkB5DRc3umPpdquRMekRnqc9ZSb2YBNguumBfXvb/exec';

    const CustomSelect = ({ value, onChange, options, className, placeholder, icon, title, listClassName }) => {
      const [isOpen, setIsOpen] = useState(false);
      const containerRef = React.useRef(null);

      React.useEffect(() => {
        const handleClickOutside = (e) => {
          if (containerRef.current && !containerRef.current.contains(e.target)) {
            setIsOpen(false);
          }
        };
        document.addEventListener('mousedown', handleClickOutside);
        return () => document.removeEventListener('mousedown', handleClickOutside);
      }, []);

      const selectedOption = options.find(o => String(o.value) === String(value));

      return (
        <div className={`relative ${className?.includes('w-') ? '' : 'w-full'}`} ref={containerRef} title={title}>
          <button
            type="button"
            onClick={() => setIsOpen(!isOpen)}
            className={`text-left flex justify-between items-center outline-none bg-white border border-slate-200 rounded-xl hover:border-emerald-300 focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10 transition-all ${className}`}
          >
            <div className="flex items-center gap-2 truncate flex-1 min-w-0">
              {icon && <span className="text-slate-400 shrink-0">{icon}</span>}
              <span className={`truncate ${!selectedOption && placeholder ? 'text-slate-400' : ''}`}>
                {selectedOption ? selectedOption.label : placeholder || 'Pilih...'}
              </span>
            </div>
            <i className={`fas fa-chevron-down text-slate-400 text-[10px] transition-transform duration-300 ml-2 shrink-0 ${isOpen ? 'rotate-180' : ''}`}></i>
          </button>
          {isOpen && (
            <div className={`absolute z-[9999] mt-2 bg-white rounded-2xl shadow-[0_10px_40px_-10px_rgba(0,0,0,0.15)] border border-slate-100 overflow-hidden py-2 animate-in fade-in zoom-in-95 duration-200 ${listClassName || 'w-full min-w-[150px] left-0'}`}>
              <div className="max-h-60 overflow-y-auto custom-scrollbar px-1">
                {options.map((opt, i) => (
                  <button
                    key={i}
                    type="button"
                    onClick={(e) => { e.stopPropagation(); onChange(opt.value); setIsOpen(false); }}
                    className={`w-full text-left px-3 py-2.5 rounded-xl text-sm transition-all flex items-center justify-between group ${String(value) === String(opt.value) ? 'bg-emerald-50 text-emerald-700 font-bold' : 'text-slate-600 hover:bg-slate-50 hover:text-slate-900'}`}
                  >
                    <span className="truncate">{opt.label}</span>
                    {String(value) === String(opt.value) && <i className="fas fa-check text-emerald-500 text-xs"></i>}
                  </button>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    };

    function CookApp() {
      const [recipes, setRecipes] = useState([]);
      const [purchases, setPurchases] = useState([]);
      const [sales, setSales] = useState([]);
      const [adjustments, setAdjustments] = useState([]);
      const [searchKatalog, setSearchKatalog] = useState('');
      const [filterDapurCategory, setFilterDapurCategory] = useState('');
      const [selectedKatalogMenu, setSelectedKatalogMenu] = useState(null);
      const [isLoading, setIsLoading] = useState(true);

      const autoRefreshRef = React.useRef(null);

      useEffect(() => {
        fetchRecipes();
        autoRefreshRef.current = setInterval(() => {
          fetchRecipes(true);
        }, 60000);
        return () => clearInterval(autoRefreshRef.current);
      }, []);

      const fetchRecipes = async (isSilent = false) => {
        if (isSilent !== true) setIsLoading(true);
        try {
          const response = await fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'getPublicRecipes' }),
          });
          const result = await response.json();
          if (result.status === 'success') {
            setRecipes(result.data.recipes || []);
            setPurchases(result.data.purchases || []);
            setSales(result.data.sales || []);
            setAdjustments(result.data.adjustments || []);
          } else {
            if (isSilent !== true) alert('Gagal mengambil data resep: ' + result.message);
          }
        } catch (error) {
          if (isSilent !== true) alert('Terjadi kesalahan jaringan.');
        } finally {
          if (isSilent !== true) setIsLoading(false);
        }
      };

      const formatNum = (num) => {
        if (num === null || num === undefined) return '0';
        return Number(num).toString().replace('.', ',');
      };

      const parseNumberInput = (str) => {
        if (typeof str === 'number') return str;
        if (str === null || str === undefined || str === '') return 0;
        let s = String(str);
        if (s.includes(',')) {
          s = s.replace(/\./g, '').replace(/,/g, '.');
        }
        const n = parseFloat(s);
        return isNaN(n) ? 0 : n;
      };

      const getRecipeYield = (recipe) => {
        if (!recipe) return { qty: 1, unit: 'porsi' };
        const meta = recipe.ingredients?.find(i => i.id === 'META_YIELD');
        if (meta) return { qty: parseNumberInput(meta.qty) || 1, unit: meta.unit || 'porsi' };
        return { qty: parseNumberInput(recipe.yieldQty) || 1, unit: recipe.yieldUnit || 'porsi' };
      };

      const uniqueItems = useMemo(() => {
        const items = new Map();
        purchases.forEach(p => {
          const nameLower = String(p.itemName || '').toLowerCase();
          if (!items.has(nameLower)) items.set(nameLower, { name: p.itemName, unit: p.unit });
        });
        recipes.forEach(r => {
          const resepName = `[Resep] ${r.menuName}`;
          if (!items.has(resepName.toLowerCase())) {
            const yieldData = getRecipeYield(r);
            items.set(resepName.toLowerCase(), { name: resepName, unit: yieldData.unit });
          }
        });
        return Array.from(items.values());
      }, [purchases, recipes]);

      const inventoryData = useMemo(() => {
        const stockMap = new Map();
        const ensureItem = (name, rawName) => {
          if (!stockMap.has(name)) {
            const uItem = uniqueItems.find(u => u.name.toLowerCase() === name);
            stockMap.set(name, { name: rawName, unit: uItem ? uItem.unit : '', stokAwal: 0, masuk: 0, keluarSales: 0, keluarAdjustments: 0 });
          }
          return stockMap.get(name);
        };
        const getBucket = () => 'current'; // Simplified for public view without filterMonth

        purchases.forEach(p => {
          const name = String(p.itemName || '').toLowerCase();
          ensureItem(name, p.itemName).masuk += (Number(p.quantity) || 0);
        });

        sales.forEach(sale => {
          const recipe = recipes.find(r => String(r.id) === String(sale.recipeId));
          if (recipe) {
            const qtySold = Number(sale.quantitySold) || 0;
            const deductIngredients = (currentRecipe, multiplier, visited = new Set()) => {
              if (!currentRecipe || visited.has(currentRecipe.id)) return;
              visited.add(currentRecipe.id);
              currentRecipe.ingredients.forEach(ing => {
                const nameStr = String(ing.itemName || '').toLowerCase();
                const qtyUsed = parseNumberInput(ing.quantity) * multiplier;
                const subRecipe = recipes.find(r => `[resep] ${String(r.menuName || '').toLowerCase()}` === nameStr || String(r.menuName || '').toLowerCase() === nameStr);
                if (subRecipe) {
                  const yieldData = getRecipeYield(subRecipe);
                  const subMultiplier = yieldData.qty > 0 ? (qtyUsed / yieldData.qty) : 0;
                  deductIngredients(subRecipe, subMultiplier, new Set(visited));
                } else {
                  ensureItem(nameStr, ing.itemName).keluarSales += qtyUsed;
                }
              });
            };
            deductIngredients(recipe, qtySold);
          }
        });

        adjustments.forEach(adj => {
          const name = String(adj.itemName || '').toLowerCase();
          ensureItem(name, adj.itemName).keluarAdjustments += (Number(adj.quantity) || 0);
        });

        return Array.from(stockMap.values()).filter(item => item.name && item.name.trim() !== '').map(item => ({
          ...item,
          stokAkhir: item.stokAwal + item.masuk - item.keluarSales - item.keluarAdjustments
        }));
      }, [purchases, recipes, sales, adjustments, uniqueItems]);

      const getFlatRequiredIngredients = (recipeId, multiplier = 1) => {
        const reqMap = new Map();
        const traverse = (recId, mult, visited = new Set()) => {
          if (visited.has(recId)) return;
          visited.add(recId);
          const r = recipes.find(rec => rec.id === recId);
          if (!r) return;
          r.ingredients.forEach(ing => {
            if (ing.id === 'META_YIELD' || ing.itemName === 'META_STATUS' || ing.itemName === 'META_CATEGORY_ORDER' || ing.itemName === 'META_MENU_CATEGORY') return;
            const qty = parseNumberInput(ing.quantity) * mult;
            if (qty <= 0) return;
            const searchStr = String(ing.itemName || '').toLowerCase();
            const subRecipe = recipes.find(rec => String(rec.id) === String(ing.itemName) || `[resep] ${String(rec.menuName || '').toLowerCase()}` === searchStr || String(rec.menuName || '').toLowerCase() === searchStr);
            if (subRecipe) {
              const subYieldQty = parseNumberInput(getRecipeYield(subRecipe).qty) || 1;
              traverse(subRecipe.id, qty / subYieldQty, new Set(visited));
            } else {
              reqMap.set(searchStr, (reqMap.get(searchStr) || 0) + qty);
            }
          });
        };
        traverse(recipeId, multiplier);
        return reqMap;
      };

      const calculateMaxPortions = (recipeId) => {
        const recipe = recipes.find(r => r.id === recipeId);
        if (!recipe || !recipe.ingredients || recipe.ingredients.length === 0) return 0;
        const reqMap = getFlatRequiredIngredients(recipe.id);
        if (reqMap.size === 0) return 0;
        let maxBatches = Infinity;
        reqMap.forEach((reqQty, ingName) => {
          const invItem = inventoryData.find(item => String(item.name).toLowerCase() === ingName);
          const stock = invItem ? invItem.stokAkhir : 0;
          if (reqQty > 0) {
            maxBatches = Math.min(maxBatches, stock / reqQty);
          }
        });
        if (maxBatches === Infinity) return 0;
        const yieldData = getRecipeYield(recipe);
        return Math.floor(maxBatches * yieldData.qty);
      };

      const getLackingIngredients = (recipeId) => {
        const reqMap = getFlatRequiredIngredients(recipeId);
        const lacking = [];
        const yieldData = getRecipeYield(recipes.find(r => r.id === recipeId));
        // Calculate needed for 1 batch (which produces yieldData.qty portions)
        reqMap.forEach((reqQty, ingName) => {
          const invItem = inventoryData.find(item => String(item.name).toLowerCase() === ingName);
          const stock = invItem ? invItem.stokAkhir : 0;
          if (stock < reqQty) {
            lacking.push({ name: invItem ? invItem.name : ingName, needed: reqQty, stock: stock, unit: invItem ? invItem.unit : '' });
          }
        });
        return lacking;
      };

      const handleExportCookExcel = () => {
        const headers = ['Kategori', 'Nama Menu', 'Porsi / Hasil', 'Prep Time', 'Cook Time', 'Tools'];
        const rows = recipes.filter(r => r.ingredients?.find(i => i.id === 'META_YIELD')?.type !== 'sub').map(recipe => {
          const isAdvanced = typeof recipe.instructions === 'object' && recipe.instructions !== null;
          const instObj = isAdvanced ? recipe.instructions : {};
          const yieldData = getRecipeYield(recipe);
          return [
            `"${recipe.ingredients?.find(i => i.itemName === 'META_MENU_CATEGORY')?.quantity || '-'}"`,
            `"${recipe.menuName}"`,
            `"${yieldData.qty} ${yieldData.unit}"`,
            `"${instObj.prepTime || '-'}"`,
            `"${instObj.cookTime || '-'}"`,
            `"${instObj.tools || '-'}"`
          ];
        });

        const csvContent = [headers.join(','), ...rows.map(r => r.join(','))].join('\n');
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", `Katalog_Dapur.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      const handleExportRecipeCookExcel = (recipe) => {
        const isAdvanced = typeof recipe.instructions === 'object' && recipe.instructions !== null;
        const instObj = isAdvanced ? recipe.instructions : {};
        const yieldData = getRecipeYield(recipe);

        let csv = `Menu,${recipe.menuName}\n`;
        csv += `Porsi / Hasil,${yieldData.qty} ${yieldData.unit}\n`;
        csv += `Prep Time,${instObj.prepTime || '-'}\n`;
        csv += `Cook Time,${instObj.cookTime || '-'}\n`;
        csv += `Tools,${instObj.tools || '-'}\n\n`;

        csv += `BAHAN BAKU\n`;
        csv += `Nama Bahan,Jumlah,Satuan\n`;
        if (recipe.ingredients) {
          recipe.ingredients.forEach(ing => {
            if (ing.id === 'META_YIELD' || ing.itemName === 'META_STATUS' || ing.itemName === 'META_CATEGORY_ORDER' || ing.itemName === 'META_MENU_CATEGORY') return;
            csv += `"${ing.itemName}","${ing.quantity}","${ing.unit}"\n`;
          });
        }
        csv += `\n`;

        if (isAdvanced && instObj.phases) {
          csv += `INSTRUKSI MEMASAK\n`;
          csv += `Tahap,Proses,Suhu,Waktu,Catatan\n`;
          instObj.phases.forEach(phase => {
            if (phase.steps) {
              phase.steps.forEach(step => {
                csv += `"${phase.phase}","${String(step.process || '').replace(/"/g, '""')}","${String(step.temp || '').replace(/"/g, '""')}","${String(step.time || '').replace(/"/g, '""')}","${String(step.notes || '').replace(/"/g, '""')}"\n`;
              });
            }
          });
        } else if (!isAdvanced && recipe.instructions) {
          csv += `INSTRUKSI MEMASAK\n`;
          csv += `"${String(recipe.instructions || '').replace(/"/g, '""')}"\n`;
        }

        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", `Resep_Dapur_${recipe.menuName}.csv`);
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      return (
        <div className="min-h-screen pb-12">
          {/* Header */}
          <header className="bg-emerald-600 text-white shadow-md sticky top-0 z-40 print:hidden">
            <div className="max-w-[1600px] mx-auto px-4 sm:px-6 lg:px-8">
              <div className="flex justify-between items-center h-16">
                <div className="flex items-center gap-3">
                  <div className="bg-white/20 p-2 rounded-xl backdrop-blur-sm">
                    <i className="fas fa-utensils text-xl text-white"></i>
                  </div>
                  <h1 className="text-xl font-black tracking-tight text-white drop-shadow-sm">Katalog Dapur</h1>
                </div>
                <button onClick={fetchRecipes} className="bg-white/10 hover:bg-white/20 border border-transparent transition-colors px-4 py-2 rounded-lg font-medium text-sm flex items-center gap-2">
                  <i className={`fas fa-sync-alt ${isLoading ? 'animate-spin' : ''}`}></i>
                  <span className="hidden sm:inline">Segarkan</span>
                </button>
              </div>
            </div>
          </header>

          <main className={`max-w-[1600px] mx-auto px-4 sm:px-6 lg:px-8 py-8 ${selectedKatalogMenu ? 'print:hidden' : ''}`}>
            {isLoading && recipes.length === 0 ? (
              <div className="flex flex-col items-center justify-center py-20">
                <i className="fas fa-circle-notch fa-spin text-5xl text-emerald-500 mb-4 drop-shadow-sm"></i>
                <p className="text-slate-500 font-medium animate-pulse">Memuat katalog resep...</p>
              </div>
            ) : (
              <div className="space-y-6">
                {/* Search Bar */}
                <div className="bg-white p-4 sm:p-6 rounded-2xl shadow-sm border border-slate-200 flex flex-col sm:flex-row gap-4 print:hidden">
                  <div className="relative flex-1">
                    <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                      <i className="fas fa-search text-slate-400"></i>
                    </div>
                    <input
                      type="text"
                      className="w-full pl-11 pr-4 py-4 bg-stone-50 border-2 border-slate-100 rounded-xl outline-none focus:border-emerald-500 font-medium text-lg text-slate-800 placeholder-slate-400 transition-colors"
                      placeholder="Cari menu untuk dimasak..."
                      value={searchKatalog}
                      onChange={(e) => setSearchKatalog(e.target.value)}
                    />
                  </div>
                  <div className="relative w-full sm:w-64 shrink-0">
                    <CustomSelect
                      className="py-4 px-4 bg-stone-50 border-2 border-slate-100 font-medium text-lg text-slate-800"
                      value={filterDapurCategory}
                      onChange={(val) => setFilterDapurCategory(val)}
                      icon={<i className="fas fa-tags text-lg"></i>}
                      options={[
                        { label: 'Semua Kategori', value: '' },
                        ...Array.from(new Set(recipes.map(r => r.ingredients?.find(i => i.itemName === 'META_MENU_CATEGORY')?.quantity).filter(Boolean))).map(cat => ({ label: cat, value: cat }))
                      ]}
                    />
                  </div>
                </div>

                <div className="flex flex-col sm:flex-row gap-4 items-start sm:items-center justify-between">
                  <div className="flex flex-wrap gap-3 items-center">
                    <span className="bg-white border border-slate-200 text-slate-700 text-xs font-bold px-3 py-1.5 rounded-lg shadow-sm flex items-center gap-1.5">
                      <i className="fas fa-utensils text-emerald-500"></i> Total Menu: {recipes.filter(r => r.ingredients?.find(i => i.id === 'META_YIELD')?.type !== 'sub' && String(r.ingredients?.find(i => i.itemName === 'META_STATUS')?.quantity) !== 'false').length}
                    </span>
                  </div>
                  <div className="flex items-center gap-2 shrink-0 print:hidden">
                    <button onClick={handleExportCookExcel} className="bg-emerald-50 hover:bg-emerald-100 text-emerald-600 border border-emerald-200 p-2 rounded-lg transition-colors font-bold flex items-center gap-2 px-3 text-sm">
                      <i className="fas fa-file-excel"></i> Excel
                    </button>
                    <button onClick={() => window.print()} className="bg-blue-50 hover:bg-blue-100 text-blue-600 border border-blue-200 p-2 rounded-lg transition-colors font-bold flex items-center gap-2 px-3 text-sm">
                      <i className="fas fa-print"></i> Cetak PDF
                    </button>
                  </div>
                </div>

                {/* Grid */}
                <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-5 gap-4">
                  {recipes.filter(r => r.ingredients?.find(i => i.id === 'META_YIELD')?.type !== 'sub' && r.menuName.toLowerCase().includes(searchKatalog.toLowerCase()) && String(r.ingredients?.find(i => i.itemName === 'META_STATUS')?.quantity) !== 'false' && (!filterDapurCategory || r.ingredients?.find(i => i.itemName === 'META_MENU_CATEGORY')?.quantity === filterDapurCategory)).map(recipe => (
                    <div key={recipe.id} onClick={() => setSelectedKatalogMenu(recipe)} className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden group cursor-pointer hover:shadow-lg hover:-translate-y-1 transition-all duration-300 flex flex-col">
                      {/* Image Container: Aspect Square (1:1) full width */}
                      <div className="w-full aspect-square bg-slate-100 relative overflow-hidden flex items-center justify-center shrink-0 border-b border-slate-100">
                        {recipe.imageUrl ? (
                          <img src={recipe.imageUrl} alt={recipe.menuName} className="w-full h-full object-contain group-hover:scale-105 transition-transform duration-500" onError={(e) => { e.target.style.display = 'none'; e.target.nextSibling.style.display = 'flex'; }} />
                        ) : (
                          <div className="text-slate-300 flex flex-col items-center">
                            <i className="fas fa-image text-4xl mb-2"></i>
                            <span className="text-sm font-medium">Tanpa Foto</span>
                          </div>
                        )}
                        <div className="absolute inset-0 bg-gradient-to-t from-black/70 to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-end justify-center p-4">
                          <span className="text-white font-bold text-sm bg-emerald-600/90 backdrop-blur-sm px-4 py-2 rounded-full shadow-lg border border-emerald-500/50">
                            <i className="fas fa-book-open mr-2"></i>Buka Resep
                          </span>
                        </div>
                      </div>
                      <div className="p-3 flex-1 flex flex-col">
                        <h3 className="font-black text-sm text-slate-800 mb-2 line-clamp-2 leading-tight">{recipe.menuName}</h3>
                        <div className="flex flex-wrap gap-2 mb-4">
                          {recipe.instructions ? (
                            <span className="inline-flex items-center gap-1.5 text-[11px] font-bold text-emerald-700 bg-emerald-50 px-2 py-1 rounded border border-emerald-200 shadow-sm">
                              <i className="fas fa-check"></i> Resep Tersedia
                            </span>
                          ) : (
                            <span className="inline-flex items-center gap-1.5 text-[11px] font-bold text-amber-700 bg-amber-50 px-2 py-1 rounded border border-amber-200 shadow-sm">
                              <i className="fas fa-exclamation-triangle"></i> Menunggu Resep
                            </span>
                          )}
                          <span className={`inline-flex items-center gap-1.5 text-[11px] font-bold px-2 py-1 rounded border shadow-sm ${calculateMaxPortions(recipe.id) === 0 ? 'text-rose-700 bg-rose-50 border-rose-200' : 'text-sky-700 bg-sky-50 border-sky-200'}`}>
                            <i className="fas fa-boxes"></i> Bisa dibuat: {formatNum(calculateMaxPortions(recipe.id))} {getRecipeYield(recipe).unit}
                          </span>
                        </div>
                        <div className="mt-auto pt-4 border-t border-slate-100 flex items-center justify-between text-sm text-slate-500 font-medium">
                          <span>Hasil Jadi:</span>
                          <span className="text-slate-800 font-black bg-stone-100 px-2 py-1 rounded">
                            {formatNum(recipe.ingredients?.find(i => i.id === 'META_YIELD')?.qty || 1)} {recipe.ingredients?.find(i => i.id === 'META_YIELD')?.unit || 'porsi'}
                          </span>
                        </div>
                      </div>
                    </div>
                  ))}
                  {recipes.filter(r => r.ingredients?.find(i => i.id === 'META_YIELD')?.type !== 'sub' && r.menuName.toLowerCase().includes(searchKatalog.toLowerCase()) && String(r.ingredients?.find(i => i.itemName === 'META_STATUS')?.quantity) !== 'false' && (!filterDapurCategory || r.ingredients?.find(i => i.itemName === 'META_MENU_CATEGORY')?.quantity === filterDapurCategory)).length === 0 && !isLoading && (
                    <div className="col-span-full py-12 text-center bg-white rounded-2xl border border-slate-200">
                      <div className="bg-stone-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4 border border-slate-200">
                        <i className="fas fa-search text-3xl text-slate-400"></i>
                      </div>
                      <h3 className="text-xl font-bold text-slate-700 mb-1">Menu Tidak Ditemukan</h3>
                      <p className="text-slate-500">Coba kata kunci lain atau hubungi admin.</p>
                    </div>
                  )}
                </div>
              </div>
            )}
          </main>

          {/* Modal Rincian Resep */}
          {selectedKatalogMenu && (() => {
            const recipe = selectedKatalogMenu;
            const yieldMeta = recipe.ingredients?.find(i => i.id === 'META_YIELD') || { qty: 1, unit: 'porsi' };
            const yieldQty = yieldMeta.qty;
            const yieldUnit = yieldMeta.unit;

            return (
              <div className="fixed inset-0 z-50 bg-white animate-in slide-in-from-bottom-10 duration-300 overflow-y-auto lg:overflow-hidden print:absolute print:inset-auto print:top-0 print:left-0 print:w-full print:h-auto print:overflow-visible">
                <button onClick={() => setSelectedKatalogMenu(null)} className="fixed lg:absolute top-4 right-4 z-50 w-12 h-12 bg-white/80 backdrop-blur-md hover:bg-slate-100 border border-slate-200 text-slate-500 hover:text-slate-800 rounded-full flex items-center justify-center transition-colors shadow-md">
                  <i className="fas fa-times text-xl"></i>
                </button>

                {/* Modal Content Structure */}
                <div className="flex flex-col lg:flex-row w-full lg:h-full min-h-screen print:flex-col print:h-auto print:min-h-0">

                  {/* Left Column: Image, Info, Ingredients (w-1/3) */}
                  <div className="w-full lg:w-1/3 lg:h-full flex flex-col border-b lg:border-b-0 lg:border-r border-slate-200 bg-slate-50 shrink-0 print:w-full print:border-r-0 print:border-b print:h-auto print:block">
                    <div className="w-full aspect-square lg:aspect-auto lg:h-64 relative shrink-0 bg-white border-b border-slate-200 flex items-center justify-center overflow-hidden">
                      {recipe.imageUrl ? (
                        <img src={recipe.imageUrl} className="w-full h-full object-contain p-2 lg:p-4" />
                      ) : (
                        <div className="text-slate-300 flex flex-col items-center">
                          <i className="fas fa-utensils text-5xl lg:text-7xl mb-4"></i>
                          <span className="font-bold tracking-widest text-xs lg:text-sm">NO IMAGE</span>
                        </div>
                      )}
                    </div>

                    <div className="p-5 lg:p-6 lg:overflow-y-auto flex-1 print:overflow-visible print:h-auto">
                      <div className="flex flex-col sm:flex-row justify-between items-start gap-4 mb-3">
                        <h2 className="text-3xl lg:text-4xl font-black text-slate-900 leading-tight">{recipe.menuName}</h2>
                        <div className="flex items-center gap-2 print:hidden shrink-0 mt-2 sm:mt-0">
                          <button onClick={() => handleExportRecipeCookExcel(recipe)} className="bg-emerald-50 hover:bg-emerald-100 text-emerald-600 border border-emerald-200 p-2 rounded-lg transition-colors font-bold flex items-center gap-2 text-xs">
                            <i className="fas fa-file-excel"></i> Excel
                          </button>
                          <button onClick={() => window.print()} className="bg-blue-50 hover:bg-blue-100 text-blue-600 border border-blue-200 p-2 rounded-lg transition-colors font-bold flex items-center gap-2 text-xs">
                            <i className="fas fa-print"></i> Cetak PDF
                          </button>
                        </div>
                      </div>
                      <div className="flex flex-wrap gap-2 mb-6">
                        <div className="inline-flex items-center gap-2 text-sm font-bold text-emerald-700 bg-emerald-100 px-3 py-1.5 rounded-full shadow-sm">
                          <i className="fas fa-utensils"></i> Resep {formatNum(yieldQty)} {yieldUnit}
                        </div>
                        <div className={`inline-flex items-center gap-2 text-sm font-bold px-3 py-1.5 rounded-full shadow-sm ${calculateMaxPortions(recipe.id) === 0 ? 'text-rose-700 bg-rose-100' : 'text-sky-700 bg-sky-100'}`} title="Berdasarkan stok bahan baku yang tersisa di inventori saat ini">
                          <i className="fas fa-boxes"></i> Bisa dibuat: {formatNum(calculateMaxPortions(recipe.id))} {yieldUnit}
                        </div>
                      </div>

                      {getLackingIngredients(recipe.id).length > 0 && (
                        <div className="mb-6 bg-rose-50 border border-rose-200 rounded-xl p-4 shadow-sm animate-fade-in-up break-inside-avoid">
                          <h4 className="text-rose-700 font-bold text-sm mb-2 flex items-center gap-2">
                            <i className="fas fa-exclamation-circle"></i> Bahan Kurang (Untuk 1 Resep):
                          </h4>
                          <ul className="text-sm text-rose-600 space-y-1">
                            {getLackingIngredients(recipe.id).map((lack, idx) => (
                              <li key={idx} className="flex justify-between border-b border-rose-100 pb-1 last:border-0 last:pb-0">
                                <span>{lack.name}</span>
                                <span className="font-bold text-right">{formatNum(lack.stock)} / {formatNum(lack.needed)} {lack.unit}</span>
                              </li>
                            ))}
                          </ul>
                        </div>
                      )}
                      {(() => {
                        const isAdvanced = typeof recipe.instructions === 'object' && recipe.instructions !== null;
                        const instObj = isAdvanced ? recipe.instructions : {};

                        // Group ingredients
                        const groupedIngredients = {};
                        const uncategorized = [];
                        let customCategoryOrder = [];

                        if (recipe.ingredients) {
                          const catOrderMeta = recipe.ingredients.find(i => i.itemName === 'META_CATEGORY_ORDER');
                          if (catOrderMeta && catOrderMeta.quantity) {
                            try { customCategoryOrder = JSON.parse(catOrderMeta.quantity); } catch (e) { }
                          }

                          recipe.ingredients.forEach(ing => {
                            if (ing.id === 'META_YIELD' || ing.itemName === 'META_STATUS' || ing.itemName === 'META_CATEGORY_ORDER' || ing.itemName === 'META_MENU_CATEGORY') return;
                            if (ing.category) {
                              if (!groupedIngredients[ing.category]) groupedIngredients[ing.category] = [];
                              groupedIngredients[ing.category].push(ing);
                            } else {
                              uncategorized.push(ing);
                            }
                          });
                        }

                        const sortedCategories = Object.keys(groupedIngredients).sort((a, b) => {
                          let idxA = customCategoryOrder.indexOf(a);
                          let idxB = customCategoryOrder.indexOf(b);

                          if (idxA === -1 && idxB === -1) {
                            if (a === 'OTHERS') return 1;
                            if (b === 'OTHERS') return -1;
                            return a.localeCompare(b);
                          }
                          if (idxA === -1) return 1;
                          if (idxB === -1) return -1;
                          return idxA - idxB;
                        });

                        return (
                          <React.Fragment>
                            {isAdvanced && (
                              <div className="grid grid-cols-2 gap-2 mb-6">
                                <div className="bg-white border border-slate-200 rounded-lg p-3 text-center shadow-sm">
                                  <div className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">PREP TIME</div>
                                  <div className="text-lg font-black text-slate-800">{instObj.prepTime || '-'}</div>
                                </div>
                                <div className="bg-white border border-slate-200 rounded-lg p-3 text-center shadow-sm">
                                  <div className="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">COOK TIME</div>
                                  <div className="text-lg font-black text-slate-800">{instObj.cookTime || '-'}</div>
                                </div>
                              </div>
                            )}
                            {isAdvanced && instObj.tools && (
                              <div className="text-sm flex items-start gap-2 bg-white p-3 rounded-lg border border-slate-200 shadow-sm mb-6">
                                <span className="font-bold text-slate-600 whitespace-nowrap"><i className="fas fa-tools mr-1"></i> Tools:</span>
                                <span className="font-medium text-slate-800">{instObj.tools}</span>
                              </div>
                            )}

                            {/* Ingredients inside Left Column */}
                            <div className="break-inside-avoid print:mt-6">
                              <h3 className="font-bold text-lg mb-3 text-emerald-600 flex items-center gap-2"><i className="fas fa-shopping-basket"></i> Bahan Baku</h3>
                              <div className="rounded-xl overflow-x-auto border border-slate-200 bg-white shadow-sm">
                                <table className="w-full text-sm min-w-[300px]">
                                  <tbody className="divide-y divide-slate-200">
                                    {sortedCategories.map(cat => (
                                      <React.Fragment key={cat}>
                                        <tr className="bg-slate-50 border-b border-slate-200">
                                          <td colSpan="3" className="text-center font-bold py-2 uppercase text-xs tracking-widest text-emerald-800">{cat}</td>
                                        </tr>
                                        {groupedIngredients[cat].map((ing, idx) => (
                                          <tr key={idx} className="divide-x divide-slate-200 hover:bg-slate-50 transition-colors">
                                            <td className="py-2 px-3 font-medium text-slate-700">{ing.itemName}</td>
                                            <td className="py-2 px-2 w-20 text-right whitespace-nowrap text-slate-600 font-medium">{ing.netQty ? `${ing.netQty} ${ing.unit}` : `${ing.quantity} ${ing.unit}`}</td>
                                            <td className="py-2 px-2 w-20 whitespace-nowrap font-bold text-slate-900">{ing.measure || '-'}</td>
                                          </tr>
                                        ))}
                                      </React.Fragment>
                                    ))}
                                    {uncategorized.length > 0 && (
                                      <React.Fragment>
                                        {Object.keys(groupedIngredients).length > 0 && (
                                          <tr className="bg-slate-50 border-b border-slate-200">
                                            <td colSpan="3" className="text-center font-bold py-2 uppercase text-xs tracking-widest text-emerald-800">OTHERS</td>
                                          </tr>
                                        )}
                                        {uncategorized.map((ing, idx) => (
                                          <tr key={idx} className="divide-x divide-slate-200 hover:bg-slate-50 transition-colors">
                                            <td className="py-2 px-3 font-medium text-slate-700">{ing.itemName}</td>
                                            <td className="py-2 px-2 w-20 text-right whitespace-nowrap text-slate-600 font-medium">{ing.netQty ? `${ing.netQty} ${ing.unit}` : `${ing.quantity} ${ing.unit}`}</td>
                                            <td className="py-2 px-2 w-20 whitespace-nowrap font-bold text-slate-900">{ing.measure || '-'}</td>
                                          </tr>
                                        ))}
                                      </React.Fragment>
                                    )}
                                    {(!recipe.ingredients || recipe.ingredients.filter(i => i.id !== 'META_YIELD' && i.itemName !== 'META_STATUS' && i.itemName !== 'META_CATEGORY_ORDER' && i.itemName !== 'META_MENU_CATEGORY').length === 0) && (
                                      <tr><td colSpan="3" className="py-4 text-center italic text-slate-400">Belum ada rincian bahan</td></tr>
                                    )}
                                  </tbody>
                                </table>
                              </div>
                            </div>
                          </React.Fragment>
                        );
                      })()}
                    </div>
                  </div>

                  {/* Right Column: Process (w-2/3) */}
                  <div className="w-full lg:w-2/3 flex flex-col lg:h-full text-slate-800 bg-white p-5 lg:p-6 lg:overflow-y-auto print:w-full print:h-auto print:overflow-visible print:border-t print:border-slate-200">
                    {(() => {
                      const isAdvanced = typeof recipe.instructions === 'object' && recipe.instructions !== null;
                      const instObj = isAdvanced ? recipe.instructions : {};
                      const oldInstStr = !isAdvanced ? recipe.instructions : '';

                      return (
                        <React.Fragment>
                          {isAdvanced && instObj.phases && instObj.phases.length > 0 ? (
                            <div>
                              <h3 className="font-bold text-2xl mb-4 text-rose-600 flex items-center gap-2"><i className="fas fa-fire-burner"></i> Cara Memasak</h3>
                              <div className="rounded-xl overflow-hidden border border-slate-200 bg-white shadow-sm">
                                <table className="w-full text-base">
                                  <thead className="bg-slate-50 border-b border-slate-200">
                                    <tr className="divide-x divide-slate-200 font-bold text-center text-xs tracking-widest text-slate-500 uppercase">
                                      <th className="py-3 px-2 w-10">#</th>
                                      <th className="py-3 px-4">Proses</th>
                                      <th className="py-3 px-2 min-w-[70px]">Suhu</th>
                                      <th className="py-3 px-2 min-w-[70px]">Wkt</th>
                                      <th className="py-3 px-3">Catatan</th>
                                    </tr>
                                  </thead>
                                  <tbody className="divide-y divide-slate-200">
                                    {instObj.phases.map((phase, pIdx) => (
                                      <React.Fragment key={pIdx}>
                                        <tr className="bg-emerald-50 border-y border-emerald-100 break-inside-avoid">
                                          <td colSpan="5" className="py-3 px-4 font-bold text-sm uppercase text-emerald-700 tracking-wider">{phase.phase}</td>
                                        </tr>
                                        {(phase.steps || []).map((step, sIdx) => (
                                          <tr key={sIdx} className="divide-x divide-slate-200 text-center hover:bg-slate-50 transition-colors break-inside-avoid">
                                            <td className="py-3 px-2 font-black text-emerald-600 align-top text-lg">{sIdx + 1}</td>
                                            <td className="py-3 px-4 text-left font-medium text-slate-800 align-top break-words leading-relaxed">{step.process || '-'}</td>
                                            <td className="py-3 px-2 text-sm font-bold text-rose-600 align-top break-words">{step.temp || '-'}</td>
                                            <td className="py-3 px-2 text-sm font-bold text-emerald-600 align-top break-words">{step.time || '-'}</td>
                                            <td className="py-3 px-3 text-left text-slate-600 align-top break-words text-sm">{step.notes || '-'}</td>
                                          </tr>
                                        ))}
                                      </React.Fragment>
                                    ))}
                                  </tbody>
                                </table>
                              </div>
                            </div>
                          ) : (
                            oldInstStr && (
                              <div>
                                <h3 className="font-bold text-2xl mb-4 text-rose-600 flex items-center gap-2"><i className="fas fa-fire-burner"></i> Cara Memasak</h3>
                                <div className="rounded-xl border border-slate-200 bg-stone-50 p-6 whitespace-pre-line text-lg text-slate-800 leading-relaxed font-medium shadow-sm">
                                  {oldInstStr}
                                </div>
                              </div>
                            )
                          )}

                          {isAdvanced && instObj.chefNote && (
                            <div className="text-sm bg-amber-50 border border-amber-200 p-5 rounded-xl mt-8 flex gap-4 items-start shadow-sm">
                              <i className="fas fa-exclamation-circle text-amber-500 text-2xl mt-0.5"></i>
                              <div>
                                <span className="font-black text-amber-700 block mb-1.5 uppercase tracking-widest text-xs">Chef Note :</span>
                                <span className="font-semibold text-amber-900 leading-relaxed text-base">{instObj.chefNote}</span>
                              </div>
                            </div>
                          )}
                        </React.Fragment>
                      );
                    })()}
                  </div>
                </div>
              </div>
            );
          })()}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<CookApp />);
  </script>
</body>

</html>
