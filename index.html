<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FoodCost Pro</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- FontAwesome Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <!-- Babel untuk kompilasi JSX di browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script>
    Babel.registerPreset('react-classic', {
      presets: [
        [Babel.availablePresets.react, { runtime: 'classic' }]
      ]
    });
  </script>
</head>

<body class="bg-slate-100 text-slate-800">

  <div id="root"></div>

  <script type="text/babel" data-presets="react-classic">
    const { useState, useMemo, useEffect } = React;

    // --- URL GOOGLE APPS SCRIPT ANDA ---
    const API_URL = 'https://script.google.com/macros/s/AKfycbwLLywyEdvDZhKajLmbpN8ZeFTeYkB5DRc3umPpdquRMekRnqc9ZSb2YBNguumBfXvb/exec';

    const formatRp = (value) => {
      return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(value || 0);
    };

    const formatNum = (value) => {
      return new Intl.NumberFormat('id-ID').format(value || 0);
    };

    const formatNumberInput = (value) => {
      if (value === undefined || value === null) return '';
      let str = String(value).replace(/[^0-9,]/g, '');
      const parts = str.split(',');
      if (parts.length > 2) str = parts[0] + ',' + parts.slice(1).join('');
      const splitStr = str.split(',');
      const formattedInteger = splitStr[0].replace(/\B(?=(\d{3})+(?!\d))/g, '.');
      return splitStr[1] !== undefined ? `${formattedInteger},${splitStr[1]}` : formattedInteger;
    };

    const parseNumberInput = (value) => {
      return parseFloat(String(value).replace(/\./g, '').replace(',', '.')) || 0;
    };

    const getTwoMonthsAgo = () => {
      const date = new Date('2026-06-24'); // Simulasi tanggal sekarang
      date.setMonth(date.getMonth() - 2);
      return date;
    };

    function App() {
      const [activeTab, setActiveTab] = useState('recipes');
      const [isLoading, setIsLoading] = useState(false);

      const [isLoggedIn, setIsLoggedIn] = useState(false);
      const [password, setPassword] = useState('');
      const [loginError, setLoginError] = useState('');
      const [isLoggingIn, setIsLoggingIn] = useState(false);

      // State (awalnya kosong, diisi dari Spreadsheet)
      const [purchases, setPurchases] = useState([]);
      const [recipes, setRecipes] = useState([]);
      const [overheadCosts, setOverheadCosts] = useState([]);
      const [sales, setSales] = useState([]);
      const [adjustments, setAdjustments] = useState([]);

      const [searchBahan, setSearchBahan] = useState('');
      const [filterBulan, setFilterBulan] = useState('');
      const [isRefreshing, setIsRefreshing] = useState(false);
      const [salesSimulation, setSalesSimulation] = useState({});
      const [searchKatalog, setSearchKatalog] = useState('');
      const [selectedKatalogMenu, setSelectedKatalogMenu] = useState(null);

      const [newOverhead, setNewOverhead] = useState({ name: '', amount: '' });
      const [newPurchase, setNewPurchase] = useState({ date: '2026-06-24', itemName: '', unit: 'kg', quantity: '', totalPrice: '' });
      const [newMenuName, setNewMenuName] = useState('');
      const [selectedRecipeId, setSelectedRecipeId] = useState(null);
      const [newIngredient, setNewIngredient] = useState({ itemName: '', quantity: '' });

      // ==========================================
      // INTEGRASI KE GOOGLE APPS SCRIPT
      // ==========================================

      // 1. Memuat data saat aplikasi pertama kali dijalankan
      const fetchData = (pass) => {
        setIsRefreshing(true);
        fetch(`${API_URL}?password=${encodeURIComponent(pass)}`)
          .then(res => res.json())
          .then(res => {
            if (res.status === 'success') {
              setIsLoggedIn(true);
              setLoginError('');
              setPurchases(res.data.purchases || []);
              setOverheadCosts(res.data.overheadCosts || []);

              const loadedRecipes = (res.data.recipes || []).map(r => {
                const ings = Array.isArray(r.ingredients) ? r.ingredients : [];
                const yieldMeta = ings.find(i => i.id === 'META_YIELD');
                return {
                  ...r,
                  yieldQty: yieldMeta ? formatNumberInput(yieldMeta.qty) : "1",
                  yieldUnit: yieldMeta ? yieldMeta.unit : 'porsi',
                  recipeType: yieldMeta ? (yieldMeta.type || 'final') : 'final',
                  ingredients: ings.filter(i => i.id !== 'META_YIELD').map(i => ({ ...i, quantity: formatNumberInput(i.quantity) }))
                };
              });
              setRecipes(loadedRecipes);
              setSales(res.data.sales || []);
              setAdjustments(res.data.adjustments || []);
            } else if (res.status === 'unauthorized') {
              setIsLoggedIn(false);
              setLoginError(res.message || 'Sandi salah');
            }
          })
          .catch(err => {
            console.error("Error loading data", err);
            setLoginError("Koneksi gagal.");
          })
          .finally(() => {
            setIsLoading(false);
            setIsRefreshing(false);
            setIsLoggingIn(false);
          });
      };

      // Hapus useEffect fetchData otomatis agar user harus login manual.

      // 2. Helper untuk mengirim data mutasi ke server (POST)
      const sendApiRequest = async (action, data) => {
        try {
          const response = await fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify({ action, data, password }),
          });
          const result = await response.json();
          if (result.status !== 'success') {
            console.error('API Error:', result.message);
          }
        } catch (err) {
          console.error('Request failed:', err);
        }
      };

      // ==========================================
      // LOGIC KALKULASI 
      // ==========================================
      const totalOverheadMonthly = overheadCosts.reduce((sum, cost) => sum + cost.amount, 0);

      // Mengekstrak yield dari state recipe (atau fallback 1 porsi)
      const getRecipeYield = (recipe) => {
        if (!recipe) return { qty: 1, unit: 'porsi' };
        return { qty: parseNumberInput(recipe.yieldQty) || 1, unit: recipe.yieldUnit || 'porsi' };
      };

      const calculateRecipeHPP = (recipeId, visited = new Set()) => {
        if (visited.has(recipeId)) return 0; // Mencegah infinite loop
        visited.add(recipeId);

        const searchStr = String(recipeId || '').toLowerCase();
        const recipe = recipes.find(r =>
          String(r.id) === String(recipeId) ||
          `[resep] ${String(r.menuName || '').toLowerCase()}` === searchStr ||
          String(r.menuName || '').toLowerCase() === searchStr
        );
        if (!recipe) return 0;

        return recipe.ingredients.reduce((total, ing) => {
          const parsedQty = parseNumberInput(ing.quantity);
          return total + (getAveragePrice(ing.itemName, new Set(visited)).price * parsedQty);
        }, 0);
      };

      const getAveragePrice = (itemName, visited = new Set()) => {
        const searchStr = String(itemName || '').toLowerCase();

        // Cek apakah bahan ini sebenarnya adalah Sub-Recipe
        const isRecipeMatch = recipes.find(r =>
          `[resep] ${String(r.menuName || '').toLowerCase()}` === searchStr ||
          String(r.menuName || '').toLowerCase() === searchStr
        );
        if (isRecipeMatch) {
          const totalHPP = calculateRecipeHPP(isRecipeMatch.id, visited);
          const yieldData = getRecipeYield(isRecipeMatch);
          return { price: totalHPP / yieldData.qty, status: 'sub_recipe' };
        }

        const twoMonthsAgo = getTwoMonthsAgo();
        const recentPurchases = purchases.filter(p => String(p.itemName || '').toLowerCase() === searchStr && new Date(p.date) >= twoMonthsAgo);

        if (recentPurchases.length > 0) {
          const tCost = recentPurchases.reduce((s, p) => s + (Number(p.totalPrice) || 0), 0);
          const tQty = recentPurchases.reduce((s, p) => s + (Number(p.quantity) || 0), 0);
          let price = tQty > 0 ? tCost / tQty : 0;
          return { price: isNaN(price) ? 0 : price, status: 'avg_2_months' };
        }

        const allPurchases = purchases.filter(p => String(p.itemName || '').toLowerCase() === searchStr).sort((a, b) => new Date(b.date) - new Date(a.date));
        if (allPurchases.length > 0) {
          const tCost = Number(allPurchases[0].totalPrice) || 0;
          const tQty = Number(allPurchases[0].quantity) || 0;
          let price = tQty > 0 ? tCost / tQty : 0;
          return { price: isNaN(price) ? 0 : price, status: 'latest_fallback' };
        }
        return { price: 0, status: 'no_data' };
      };

      const uniqueItems = useMemo(() => {
        const items = new Map();
        purchases.forEach(p => {
          const nameLower = String(p.itemName || '').toLowerCase();
          if (!items.has(nameLower)) items.set(nameLower, { name: p.itemName, unit: p.unit });
        });

        // Tambahkan resep sebagai bahan jadi
        recipes.forEach(r => {
          const resepName = `[Resep] ${r.menuName}`;
          if (!items.has(resepName.toLowerCase())) {
            const yieldData = getRecipeYield(r);
            items.set(resepName.toLowerCase(), { name: resepName, unit: yieldData.unit });
          }
        });

        return Array.from(items.values());
      }, [purchases, recipes]);

      // ==========================================
      // INVENTORY CALCULATIONS
      // ==========================================
      const inventoryData = useMemo(() => {
        const stockMap = new Map();

        // 1. Total In from Purchases
        purchases.forEach(p => {
          const name = String(p.itemName || '').toLowerCase();
          if (!stockMap.has(name)) {
            stockMap.set(name, { name: p.itemName, unit: p.unit, in: 0, outSales: 0, outAdjustments: 0 });
          }
          stockMap.get(name).in += Number(p.quantity) || 0;
        });

        // 2. Total Out from Sales
        sales.forEach(sale => {
          const recipe = recipes.find(r => String(r.id) === String(sale.recipeId));
          if (recipe) {
            const qtySold = Number(sale.quantitySold) || 0;
            // Iterate all ingredients in this recipe and deduct
            recipe.ingredients.forEach(ing => {
              const name = String(ing.itemName || '').toLowerCase();
              const qtyUsed = parseNumberInput(ing.quantity) * qtySold;

              if (!stockMap.has(name)) {
                const uItem = uniqueItems.find(u => u.name.toLowerCase() === name);
                stockMap.set(name, { name: ing.itemName, unit: uItem ? uItem.unit : '', in: 0, outSales: 0, outAdjustments: 0 });
              }
              stockMap.get(name).outSales += qtyUsed;
            });
          }
        });

        // 3. Manual Adjustments (Positive = deduction/rusak/terbuang, Negative = addition)
        adjustments.forEach(adj => {
          const name = String(adj.itemName || '').toLowerCase();
          const qtyAdj = Number(adj.quantity) || 0;
          if (!stockMap.has(name)) {
            const uItem = uniqueItems.find(u => u.name.toLowerCase() === name);
            stockMap.set(name, { name: adj.itemName, unit: uItem ? uItem.unit : '', in: 0, outSales: 0, outAdjustments: 0 });
          }
          stockMap.get(name).outAdjustments += qtyAdj;
        });

        return Array.from(stockMap.values()).map(item => ({
          ...item,
          remaining: item.in - item.outSales - item.outAdjustments
        })).sort((a, b) => a.name.localeCompare(b.name));
      }, [purchases, recipes, sales, adjustments, uniqueItems]);

      // ==========================================
      // HANDLERS (Update state lokal + kirim ke API)
      // ==========================================

      // --- PURCHASES ---
      const handleAddPurchase = (e) => {
        e.preventDefault();
        const parsedQty = parseNumberInput(newPurchase.quantity);
        const parsedTotal = parseNumberInput(newPurchase.totalPrice);
        if (!newPurchase.itemName || parsedQty <= 0 || parsedTotal <= 0) return;

        const purchaseData = { ...newPurchase, id: Date.now(), quantity: parsedQty, totalPrice: parsedTotal };
        setPurchases([...purchases, purchaseData]);
        sendApiRequest('addPurchase', purchaseData);
        setNewPurchase({ ...newPurchase, itemName: '', quantity: '', totalPrice: '' });
      };

      const handleDeletePurchase = (id) => {
        setPurchases(purchases.filter(i => i.id !== id));
        sendApiRequest('deletePurchase', { id });
      };

      // --- INVENTORY (SALES & ADJUSTMENTS) ---
      const [newSale, setNewSale] = useState({ date: new Date().toISOString().split('T')[0], recipeId: '', quantitySold: '' });
      const [newAdjustment, setNewAdjustment] = useState({ date: new Date().toISOString().split('T')[0], itemName: '', quantity: '', reason: '' });

      const handleAddSale = (e) => {
        e.preventDefault();
        const parsedQty = parseNumberInput(newSale.quantitySold);
        if (!newSale.recipeId || parsedQty <= 0) return;

        const saleData = { id: Date.now(), ...newSale, quantitySold: parsedQty };
        setSales([...sales, saleData]);
        sendApiRequest('addSale', saleData);
        setNewSale({ ...newSale, recipeId: '', quantitySold: '' });
      };

      const handleDeleteSale = (id) => {
        setSales(sales.filter(s => s.id !== id));
        sendApiRequest('deleteSale', { id });
      };

      const handleAddAdjustment = (e) => {
        e.preventDefault();
        const parsedQty = parseNumberInput(newAdjustment.quantity);
        if (!newAdjustment.itemName || isNaN(parsedQty) || parsedQty === 0 || !newAdjustment.reason) return;

        const adjData = { id: Date.now(), ...newAdjustment, quantity: parsedQty };
        setAdjustments([...adjustments, adjData]);
        sendApiRequest('addAdjustment', adjData);
        setNewAdjustment({ ...newAdjustment, itemName: '', quantity: '', reason: '' });
      };

      const handleDeleteAdjustment = (id) => {
        setAdjustments(adjustments.filter(a => a.id !== id));
        sendApiRequest('deleteAdjustment', { id });
      };

      // --- RECIPES ---
      const handleAddMenu = (e) => {
        e.preventDefault();
        if (!newMenuName.trim()) {
          alert('Silakan ketik nama menu baru terlebih dahulu di kolom pengisian!');
          return;
        }
        const recipeData = { id: Date.now(), menuName: newMenuName, targetMarginPercent: 30, yieldQty: 1, yieldUnit: 'porsi', recipeType: 'final', imageUrl: '', ingredients: [] };
        setRecipes([...recipes, recipeData]);
        sendApiRequest('addRecipe', recipeData);
        setNewMenuName('');
      };

      const handleEditMenuName = (id, newName) => {
        const newRecipes = recipes.map(r => r.id === id ? { ...r, menuName: newName } : r);
        setRecipes(newRecipes);
      };

      const handleSaveRecipe = (recipeId, overrideData = null) => {
        const recipe = overrideData || recipes.find(r => r.id === recipeId);
        if (recipe) {
          const safeIngs = Array.isArray(recipe.ingredients) ? recipe.ingredients : [];
          const cleanedIngredients = safeIngs.map(i => {
            const uItem = uniqueItems.find(u => u.name === i.itemName);
            return {
              ...i,
              unit: uItem ? uItem.unit : (i.unit || ''),
              quantity: parseNumberInput(i.quantity)
            };
          });

          const parsedYield = parseNumberInput(recipe.yieldQty) || 1;

          const payload = {
            ...recipe,
            ingredients: [...cleanedIngredients, { id: 'META_YIELD', qty: parsedYield, unit: recipe.yieldUnit || 'porsi', type: recipe.recipeType || 'final' }]
          };

          sendApiRequest('updateRecipe', payload);
          setRecipes(recipes.map(r => r.id === recipeId ? { ...recipe, ingredients: cleanedIngredients.map(i => ({ ...i, quantity: formatNumberInput(i.quantity) })), yieldQty: formatNumberInput(parsedYield) } : r));
        }
      };

      const handleDeleteRecipe = (id) => {
        setRecipes(recipes.filter(r => r.id !== id));
        sendApiRequest('deleteRecipe', { id });
      };

      const handleAddIngredient = (recipeId, e) => {
        e.preventDefault();

        const parsedQty = parseNumberInput(newIngredient.quantity);

        if (!newIngredient.itemName || isNaN(parsedQty) || parsedQty <= 0) {
          alert("Pastikan nama bahan terisi dan kuantitas adalah angka lebih dari 0!");
          return;
        }

        let updatedRecipe = null;
        const newRecipes = recipes.map(r => {
          if (r.id === recipeId) {
            updatedRecipe = { ...r, ingredients: [...r.ingredients, { id: Date.now(), itemName: newIngredient.itemName, quantity: formatNumberInput(parsedQty) }] };
            return updatedRecipe;
          }
          return r;
        });

        setRecipes(newRecipes);
        if (updatedRecipe) sendApiRequest('updateRecipe', updatedRecipe);

        setNewIngredient({ itemName: '', quantity: '' });
        setSelectedRecipeId(null);
      };

      const handleDeleteIngredient = (recipeId, ingId) => {
        let updatedRecipe = null;
        const newRecipes = recipes.map(r => {
          if (r.id === recipeId) {
            updatedRecipe = { ...r, ingredients: r.ingredients.filter(i => i.id !== ingId) };
            return updatedRecipe;
          }
          return r;
        });
        setRecipes(newRecipes);
        if (updatedRecipe) sendApiRequest('updateRecipe', updatedRecipe);
      };

      const handleEditIngredientQty = (recipeId, ingId, newQty) => {
        const newRecipes = recipes.map(r => {
          if (r.id === recipeId) {
            const updatedIngredients = r.ingredients.map(i => i.id === ingId ? { ...i, quantity: newQty } : i);
            return { ...r, ingredients: updatedIngredients };
          }
          return r;
        });
        setRecipes(newRecipes);
      };

      const handleUpdateYield = (id, qty, unit) => {
        const newRecipes = recipes.map(r => r.id === id ? { ...r, yieldQty: qty, yieldUnit: unit } : r);
        setRecipes(newRecipes);
      };

      const handleUpdateType = (id, type) => {
        const newRecipes = recipes.map(r => r.id === id ? { ...r, recipeType: type } : r);
        setRecipes(newRecipes);
      };

      const handleUpdateMargin = (recipeId, newMargin) => {
        let updatedRecipe = null;
        const newRecipes = recipes.map(r => {
          if (r.id === recipeId) {
            updatedRecipe = { ...r, targetMarginPercent: Number(newMargin) };
            return updatedRecipe;
          }
          return r;
        });
        setRecipes(newRecipes);
        if (updatedRecipe) sendApiRequest('updateRecipe', updatedRecipe);
      };

      const handleSalesSimulationChange = (recipeId, val) => {
        setSalesSimulation(prev => ({ ...prev, [recipeId]: val }));
      };

      // --- OVERHEAD ---
      const handleAddOverhead = (e) => {
        e.preventDefault();
        const parsedAmount = parseNumberInput(newOverhead.amount);
        if (!newOverhead.name || parsedAmount <= 0) return;
        const overheadData = { id: Date.now(), name: newOverhead.name, amount: parsedAmount };
        setOverheadCosts([...overheadCosts, overheadData]);
        sendApiRequest('addOverhead', overheadData);
        setNewOverhead({ name: '', amount: '' });
      };

      const handleDeleteOverhead = (id) => {
        setOverheadCosts(overheadCosts.filter(c => c.id !== id));
        sendApiRequest('deleteOverhead', { id });
      };

      // ==========================================
      // UI RENDER
      // ==========================================

      if (!isLoggedIn) {
        return (
          <div className="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-emerald-900 flex items-center justify-center p-4">
            <div className="bg-white/10 backdrop-blur-xl border border-white/20 p-8 rounded-2xl w-full max-w-sm shadow-2xl relative overflow-hidden">
              <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-emerald-400 to-teal-500"></div>
              <div className="text-center mb-8">
                <div className="inline-flex items-center justify-center w-16 h-16 rounded-full bg-emerald-500/20 text-emerald-400 mb-4 shadow-inner">
                  <i className="fas fa-lock text-2xl"></i>
                </div>
                <h1 className="text-2xl font-bold text-white mb-2 tracking-tight">FoodCost Pro</h1>
                <p className="text-emerald-200/80 text-sm">Silakan masukkan sandi untuk mengakses data.</p>
              </div>

              <form onSubmit={(e) => {
                e.preventDefault();
                setIsLoggingIn(true);
                fetchData(password);
              }}>
                <div className="mb-6 relative">
                  <i className="fas fa-key absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                  <input
                    type="password"
                    placeholder="Kata Sandi"
                    className="w-full pl-12 pr-4 py-3 bg-white/5 border border-white/10 rounded-xl outline-none focus:border-emerald-500 focus:bg-white/10 text-white placeholder-slate-400 transition-all"
                    value={password}
                    onChange={e => setPassword(e.target.value)}
                    required
                  />
                </div>

                {loginError && <div className="mb-4 text-red-400 text-sm text-center bg-red-400/10 p-2 rounded-lg border border-red-400/20">{loginError}</div>}

                <button
                  type="submit"
                  disabled={isLoggingIn}
                  className="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-4 rounded-xl shadow-lg shadow-emerald-500/30 transition-all flex items-center justify-center gap-2 disabled:opacity-50"
                >
                  {isLoggingIn ? <i className="fas fa-circle-notch fa-spin"></i> : <i className="fas fa-sign-in-alt"></i>}
                  {isLoggingIn ? 'Memverifikasi...' : 'Masuk Sistem'}
                </button>
              </form>
            </div>
          </div>
        );
      }

      if (isLoading) {
        return (
          <div className="min-h-screen flex items-center justify-center bg-slate-100">
            <div className="text-center bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
              <i className="fas fa-spinner fa-spin text-5xl text-emerald-600 mb-4 block"></i>
              <p className="text-slate-600 font-bold text-lg">Menyinkronkan Database...</p>
              <p className="text-slate-400 text-sm mt-2">Menarik data dari Google Spreadsheet</p>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen p-4 md:p-8 font-sans pb-20">
          <div className="max-w-6xl mx-auto space-y-6">

            {/* Header */}
            <header className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex justify-between items-center">
              <div className="flex items-center gap-4">
                <div className="bg-emerald-100 p-4 rounded-xl text-emerald-600">
                  <i className="fas fa-database text-3xl px-2"></i>
                </div>
                <div>
                  <h1 className="text-2xl font-black text-slate-900 tracking-tight">FoodCost Pro</h1>
                  <p className="text-emerald-600 font-bold text-sm"><i className="fas fa-cloud-check"></i> Connected to Google Sheets</p>
                </div>
              </div>
              <div className="flex items-center gap-4">
                <button onClick={() => fetchData(password)} className="text-slate-400 hover:text-emerald-500 transition-colors" title="Muat Ulang Data">
                  <i className={`fas fa-sync-alt ${isRefreshing ? 'fa-spin text-emerald-500' : ''}`}></i>
                </button>
                <div className="h-8 w-8 rounded-full bg-emerald-100 flex items-center justify-center text-emerald-600 font-bold border-2 border-white shadow-sm ring-2 ring-emerald-50">
                  FA
                </div>
              </div>
            </header>

            {/* Tab Navigation */}
            <div className="flex space-x-2 bg-white p-2 rounded-xl shadow-sm border border-slate-200 overflow-x-auto">
              <button onClick={() => setActiveTab('purchases')} className={`flex-1 flex justify-center items-center gap-2 py-3 px-4 rounded-lg font-bold transition-all whitespace-nowrap ${activeTab === 'purchases' ? 'bg-slate-800 text-white shadow-md' : 'text-slate-500 hover:bg-slate-50'}`}>
                <i className="fas fa-shopping-cart"></i> 1. Data Bahan Baku
              </button>

                    </form>
                  </div>
                </div>

                {/* Tabel Dashboard Stok */}
                <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                  <h2 className="text-lg font-bold mb-4 border-b pb-2 flex items-center gap-2">
                    <i className="fas fa-boxes text-lg"></i> Dashboard Stok Saat Ini (Sisa Fisik)
                  </h2>
                  <div className="overflow-x-auto">
                    <table className="w-full text-sm whitespace-nowrap">
                      <thead className="bg-slate-50 text-slate-500">
                        <tr>
                          <th className="p-3 text-left rounded-l-lg">Nama Bahan</th>
                          <th className="p-3 text-center">Satuan</th>
                          <th className="p-3 text-right bg-blue-50/50">Total Beli (In)</th>
                          <th className="p-3 text-right bg-emerald-50/50">Terjual (Out)</th>
                          <th className="p-3 text-right bg-orange-50/50">Dibuang (Out)</th>
                          <th className="p-3 text-right rounded-r-lg bg-slate-100 font-black">Sisa Stok Fisik</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-slate-100">
                        {inventoryData.map((item, idx) => (
                          <tr key={idx} className="hover:bg-slate-50 transition-colors">
                            <td className="p-3 font-semibold text-slate-800">{item.name}</td>
                            <td className="p-3 text-center text-slate-500 uppercase font-bold text-xs">{item.unit}</td>
                            <td className="p-3 text-right text-blue-600 font-medium">{formatNum(item.in)}</td>
                            <td className="p-3 text-right text-emerald-600 font-medium">{formatNum(item.outSales)}</td>
                            <td className="p-3 text-right text-orange-600 font-medium">{formatNum(item.outAdjustments)}</td>
                            <td className={`p-3 text-right font-black ${item.remaining < 0 ? 'text-red-500 bg-red-50' : 'text-slate-800 bg-slate-50'}`}>{formatNum(item.remaining)}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                    {inventoryData.length === 0 && <p className="text-center text-slate-400 p-8">Belum ada data stok yang bisa dihitung.</p>}
                  </div>
                </div>

              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
