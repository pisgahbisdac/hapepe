<body class="bg-slate-100 text-slate-800">

  <div id="root"></div>

  <script type="text/babel" data-presets="react-classic">
    const { useState, useMemo, useEffect } = React;

    // --- URL GOOGLE APPS SCRIPT ANDA ---
    const API_URL = 'https://script.google.com/macros/s/AKfycbwLLywyEdvDZhKajLmbpN8ZeFTeYkB5DRc3umPpdquRMekRnqc9ZSb2YBNguumBfXvb/exec';

    const formatRp = (value) => {
      return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(value || 0);
    };

    const formatNum = (value) => {
      return new Intl.NumberFormat('id-ID').format(value || 0);
    };

    const formatNumberInput = (value) => {
      if (value === undefined || value === null) return '';
      // Remove thousand separators before reformatting
      let str = String(value).replace(/\./g, '');
      str = str.replace(/[^0-9,]/g, '');
      const parts = str.split(',');
      if (parts.length > 2) str = parts[0] + ',' + parts.slice(1).join('');
      const splitStr = str.split(',');
      const formattedInteger = splitStr[0].replace(/\B(?=(\d{3})+(?!\d))/g, '.');
      return splitStr[1] !== undefined ? `${formattedInteger},${splitStr[1]}` : formattedInteger;
    };

    const formatQtyInput = (value) => {
      if (value === undefined || value === null) return '';
      // Convert period to comma to allow user typing dot as decimal
      let str = String(value).replace(/\./g, ',');
      str = str.replace(/[^0-9,]/g, '');
      const parts = str.split(',');
      if (parts.length > 2) str = parts[0] + ',' + parts.slice(1).join('');
      return str;
    };

    const parseNumberInput = (value) => {
      return parseFloat(String(value).replace(/\./g, '').replace(',', '.')) || 0;
    };

    const getTwoMonthsRange = (baseMonthStr) => {
      let now;
      if (baseMonthStr) {
        now = new Date(baseMonthStr + '-01T00:00:00');
      } else {
        now = new Date();
      }
      // Awal dari 2 bulan yang lalu 
      const startDate = new Date(now.getFullYear(), now.getMonth() - 2, 1);
      // Awal dari bulan ini, untuk pembatas (< bulan ini)
      const endDate = new Date(now.getFullYear(), now.getMonth(), 1);
      return { startDate, endDate };
    };

    const CustomSelect = ({ value, onChange, options, className, placeholder, icon, title, listClassName }) => {
      const [isOpen, setIsOpen] = useState(false);
      const containerRef = React.useRef(null);

      React.useEffect(() => {
        const handleClickOutside = (e) => {
          if (containerRef.current && !containerRef.current.contains(e.target)) {
            setIsOpen(false);
          }
        };
        document.addEventListener('mousedown', handleClickOutside);
        return () => document.removeEventListener('mousedown', handleClickOutside);
      }, []);

      const selectedOption = options.find(o => String(o.value) === String(value));
      
      return (
        <div className={`relative ${className?.includes('w-') ? '' : 'w-full'}`} ref={containerRef} title={title}>
          <button 
            type="button"
            onClick={() => setIsOpen(!isOpen)}
            className={`text-left flex justify-between items-center outline-none bg-white border border-slate-200 rounded-xl hover:border-emerald-300 focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10 transition-all ${className}`}
          >
            <div className="flex items-center gap-2 truncate flex-1 min-w-0">
              {icon && <span className="text-slate-400 shrink-0">{icon}</span>}
              <span className={`truncate ${!selectedOption && placeholder ? 'text-slate-400' : ''}`}>
                {selectedOption ? selectedOption.label : placeholder || 'Pilih...'}
              </span>
            </div>
            <i className={`fas fa-chevron-down text-slate-400 text-[10px] transition-transform duration-300 ml-2 shrink-0 ${isOpen ? 'rotate-180' : ''}`}></i>
          </button>
          {isOpen && (
            <div className={`absolute z-[9999] mt-2 bg-white rounded-2xl shadow-[0_10px_40px_-10px_rgba(0,0,0,0.15)] border border-slate-100 overflow-hidden py-2 animate-in fade-in zoom-in-95 duration-200 ${listClassName || 'w-full min-w-[150px] left-0'}`}>
              <div className="max-h-60 overflow-y-auto custom-scrollbar px-1">
                {options.map((opt, i) => (
                  <button
                    key={i}
                    type="button"
                    onClick={(e) => { e.stopPropagation(); onChange(opt.value); setIsOpen(false); }}
                    className={`w-full text-left px-3 py-2.5 rounded-xl text-sm transition-all flex items-center justify-between group ${String(value) === String(opt.value) ? 'bg-emerald-50 text-emerald-700 font-bold' : 'text-slate-600 hover:bg-slate-50 hover:text-slate-900'}`}
                  >
                    <span className="truncate">{opt.label}</span>
                    {String(value) === String(opt.value) && <i className="fas fa-check text-emerald-500 text-xs"></i>}
                  </button>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    };

    function App() {
      const [activeTab, setActiveTab] = useState('recipes');
      const [isLoading, setIsLoading] = useState(false);

      const [isLoggedIn, setIsLoggedIn] = useState(false);
      const [username, setUsername] = useState('');
      const [password, setPassword] = useState('');
      const [userRole, setUserRole] = useState('');
      const [usersList, setUsersList] = useState([]);
      const [loginError, setLoginError] = useState('');
      const [isLoggingIn, setIsLoggingIn] = useState(false);

      // State (awalnya kosong, diisi dari Spreadsheet)
      const [purchases, setPurchases] = useState([]);
      const [editingPurchaseId, setEditingPurchaseId] = useState(null);
      const [editPurchaseData, setEditPurchaseData] = useState({});
      const [recipes, setRecipes] = useState([]);
      const [overheadCosts, setOverheadCosts] = useState([]);
      const [sales, setSales] = useState([]);
      const [adjustments, setAdjustments] = useState([]);
      const [customConversions, setCustomConversions] = useState([]);

      const [showConversionModal, setShowConversionModal] = useState(false);
      const [editingConversionItem, setEditingConversionItem] = useState(null);
      const [newConversion, setNewConversion] = useState({ packUnit: 'Botol', baseQty: '' });

      const [showUserModal, setShowUserModal] = useState(false);
      const [editingUser, setEditingUser] = useState(null);
      const [newUser, setNewUser] = useState({ username: '', password: '', role: 'admin' });

      const [searchBahan, setSearchBahan] = useState('');
      const [filterBulan, setFilterBulan] = useState('');
      const [inventoryFilterMonth, setInventoryFilterMonth] = useState(() => new Date().toISOString().slice(0, 7));
      const [isRefreshing, setIsRefreshing] = useState(false);
      const [salesSimulation, setSalesSimulation] = useState({});
      const [searchKatalog, setSearchKatalog] = useState('');
      const [filterKatalogCategory, setFilterKatalogCategory] = useState('');
      const [searchCosting, setSearchCosting] = useState('');
      const [filterCostingCategory, setFilterCostingCategory] = useState('');
      const [searchSimulasi, setSearchSimulasi] = useState('');
      const [selectedKatalogMenu, setSelectedKatalogMenu] = useState(null);
      const [isUploadingImage, setIsUploadingImage] = useState(false);
      const [inventorySearch, setInventorySearch] = useState('');
      const [selectedPriceDetailItem, setSelectedPriceDetailItem] = useState(null);

      const [newOverhead, setNewOverhead] = useState({ name: '', amount: '' });
      const [newPurchase, setNewPurchase] = useState({ date: '2026-06-24', itemName: '', unit: 'kg', quantity: '', totalPrice: '' });
      const [newMenuName, setNewMenuName] = useState('');
      const [showKitchenConfig, setShowKitchenConfig] = useState(false);
      const [selectedRecipeId, setSelectedRecipeId] = useState(null);
      const [selectedCostingRecipe, setSelectedCostingRecipe] = useState(null);
      const [editingRecipeData, setEditingRecipeData] = useState(null);
      const [isCreatingNewRecipe, setIsCreatingNewRecipe] = useState(false);
      const [newIngredient, setNewIngredient] = useState({ itemName: '', quantity: '' });


      // ==========================================
      // INTEGRASI KE GOOGLE APPS SCRIPT
      // ==========================================

      // 1. Memuat data saat aplikasi pertama kali dijalankan
      const fetchData = (user, pass) => {
        setIsRefreshing(true);
        fetch(`${API_URL}?username=${encodeURIComponent(user)}&password=${encodeURIComponent(pass)}`)
          .then(res => res.json())
          .then(res => {
            if (res.status === 'success') {
              setIsLoggedIn(true);
              setLoginError('');
              setPurchases(res.data.purchases || []);
              setOverheadCosts(res.data.overheadCosts || []);

              const loadedRecipes = (res.data.recipes || []).map(r => {
                const ings = Array.isArray(r.ingredients) ? r.ingredients : [];
                const yieldMeta = ings.find(i => i.id === 'META_YIELD');
                const statusMeta = ings.find(i => i.itemName === 'META_STATUS');
                const catOrderMeta = ings.find(i => i.itemName === 'META_CATEGORY_ORDER');
                const menuCatMeta = ings.find(i => i.itemName === 'META_MENU_CATEGORY');
                let customCategoryOrder = [];
                if (catOrderMeta && catOrderMeta.quantity) {
                  try { customCategoryOrder = JSON.parse(catOrderMeta.quantity); } catch (e) { }
                }
                return {
                  ...r,
                  isActive: statusMeta ? (String(statusMeta.quantity) === 'true') : true,
                  customCategoryOrder: customCategoryOrder,
                  menuCategory: menuCatMeta ? menuCatMeta.quantity : '',
                  recipeType: yieldMeta ? (yieldMeta.type || 'final') : 'final',
                  yieldQty: yieldMeta ? formatQtyInput(yieldMeta.qty) : "1",
                  yieldUnit: yieldMeta ? yieldMeta.unit : "porsi",
                  imageUrl: r.imageUrl || '',
                  ingredients: ings.filter(i => i.id !== 'META_YIELD' && i.itemName !== 'META_STATUS' && i.itemName !== 'META_CATEGORY_ORDER' && i.itemName !== 'META_MENU_CATEGORY').map(i => ({ ...i, quantity: formatQtyInput(i.quantity) }))
                };
              });
              setRecipes(loadedRecipes);
              setSales(res.data.sales || []);
              setAdjustments(res.data.adjustments || []);
              setCustomConversions(res.data.conversions || []);
              setUserRole(res.data.role || 'staff');
              setActiveTab(res.data.role === 'admin' ? 'recipes' : 'purchases');
              if (res.data.users) setUsersList(res.data.users);
            } else if (res.status === 'unauthorized') {
              setIsLoggedIn(false);
              setLoginError(res.message || 'Sandi salah');
            }
          })
          .catch(err => {
            console.error("Error loading data", err);
            setLoginError("Koneksi gagal.");
          })
          .finally(() => {
            setIsLoading(false);
            setIsRefreshing(false);
            setIsLoggingIn(false);
          });
      };

      // Hapus useEffect fetchData otomatis agar user harus login manual.

      // Auto-refresh setiap 60 detik untuk sinkronisasi multi-user
      const [saveToast, setSaveToast] = useState(null);
      const [confirmDialog, setConfirmDialog] = useState(null);
      const toastTimeoutRef = React.useRef(null);
      const autoRefreshRef = React.useRef(null);
      const lastMutationTimeRef = React.useRef(0);

      React.useEffect(() => {
        if (isLoggedIn && username && password) {
          autoRefreshRef.current = setInterval(() => {
            if (Date.now() - lastMutationTimeRef.current < 20000) return;
            setIsRefreshing(true);
            fetch(`${API_URL}?username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`)
              .then(res => res.json())
              .then(res => {
                if (res.status === 'success') {
                  setPurchases(res.data.purchases || []);
                  setOverheadCosts(res.data.overheadCosts || []);
                  const loadedRecipes = (res.data.recipes || []).map(r => {
                    const ings = Array.isArray(r.ingredients) ? r.ingredients : [];
                    const yieldMeta = ings.find(i => i.id === 'META_YIELD');
                    const statusMeta = ings.find(i => i.itemName === 'META_STATUS');
                    const catOrderMeta = ings.find(i => i.itemName === 'META_CATEGORY_ORDER');
                    const menuCatMeta = ings.find(i => i.itemName === 'META_MENU_CATEGORY');
                    let customCategoryOrder = [];
                    if (catOrderMeta && catOrderMeta.quantity) {
                      try { customCategoryOrder = JSON.parse(catOrderMeta.quantity); } catch (e) { }
                    }
                    return {
                      ...r,
                      isActive: statusMeta ? (String(statusMeta.quantity) === 'true') : true,
                      customCategoryOrder: customCategoryOrder,
                      menuCategory: menuCatMeta ? menuCatMeta.quantity : '',
                      recipeType: yieldMeta ? (yieldMeta.type || 'final') : 'final',
                      yieldQty: yieldMeta ? formatQtyInput(yieldMeta.qty) : "1",
                      yieldUnit: yieldMeta ? yieldMeta.unit : "porsi",
                      imageUrl: r.imageUrl || '',
                      ingredients: ings.filter(i => i.id !== 'META_YIELD' && i.itemName !== 'META_STATUS' && i.itemName !== 'META_CATEGORY_ORDER' && i.itemName !== 'META_MENU_CATEGORY').map(i => ({ ...i, quantity: formatQtyInput(i.quantity) }))
                    };
                  });
                  setRecipes(loadedRecipes);
                  setSales(res.data.sales || []);
                  setAdjustments(res.data.adjustments || []);
                  setCustomConversions(res.data.conversions || []);
                  if (res.data.users) setUsersList(res.data.users);
                }
              })
              .catch(() => { })
              .finally(() => setIsRefreshing(false));
          }, 60000);
        }
        return () => { if (autoRefreshRef.current) clearInterval(autoRefreshRef.current); };
      }, [isLoggedIn, username, password]);

      const handleLogout = () => {
        setConfirmDialog({
          title: 'Keluar Aplikasi',
          message: 'Apakah Anda yakin ingin keluar dari akun Anda?',
          type: 'warning',
          confirmText: 'Ya, Keluar',
          onConfirm: () => {
            setIsLoggedIn(false);
            setUsername('');
            setPassword('');
            setUserRole('');
            setUsersList([]);
            setPurchases([]);
            setRecipes([]);
            setSales([]);
            setAdjustments([]);
            setOverheadCosts([]);
            setCustomConversions([]);
            setActiveTab('recipes');
            if (autoRefreshRef.current) clearInterval(autoRefreshRef.current);
          }
        });
      };

      // 2. Helper untuk mengirim data mutasi ke server (POST)
      const sendApiRequest = async (action, data) => {
        lastMutationTimeRef.current = Date.now();
        setSaveToast({ type: 'loading', message: 'Sedang menyimpan...' });
        if (toastTimeoutRef.current) clearTimeout(toastTimeoutRef.current);
        try {
          const response = await fetch(API_URL, {
            method: 'POST',
            body: JSON.stringify({ action, data, username, password }),
          });
          const result = await response.json();
          if (result.status === 'success') {
            setSaveToast({ type: 'success', message: 'Data berhasil disimpan' });
          } else {
            console.error('API Error:', result.message);
            setSaveToast({ type: 'error', message: 'Gagal: ' + result.message });
          }
        } catch (err) {
          console.error('Request failed:', err);
          setSaveToast({ type: 'error', message: 'Gagal terhubung ke server' });
        } finally {
          toastTimeoutRef.current = setTimeout(() => {
            setSaveToast(null);
          }, 3000);
        }
      };

      // ==========================================
      // LOGIC KALKULASI 
      // ==========================================
      const totalOverheadMonthly = overheadCosts.reduce((sum, cost) => sum + cost.amount, 0);

      // Mengekstrak yield dari state recipe (atau fallback 1 porsi)
      const getRecipeYield = (recipe) => {
        if (!recipe) return { qty: 1, unit: 'porsi' };
        const meta = recipe.ingredients?.find(i => i.id === 'META_YIELD');
        if (meta) return { qty: parseNumberInput(meta.qty) || 1, unit: meta.unit || 'porsi' };
        return { qty: parseNumberInput(recipe.yieldQty) || 1, unit: recipe.yieldUnit || 'porsi' };
      };

      const calculateRecipeHPP = (recipeId, visited = new Set()) => {
        if (visited.has(recipeId)) return 0; // Mencegah infinite loop
        visited.add(recipeId);

        let recipe = null;
        if (editingRecipeData && String(editingRecipeData.id) === String(recipeId)) {
          recipe = editingRecipeData;
        } else {
          const searchStr = String(recipeId || '').toLowerCase();
          recipe = recipes.find(r =>
            String(r.id) === String(recipeId) ||
            `[resep] ${String(r.menuName || '').toLowerCase()}` === searchStr ||
            String(r.menuName || '').toLowerCase() === searchStr
          );
        }
        
        if (!recipe) return 0;

        return (recipe.ingredients || []).reduce((total, ing) => {
          if (ing.id === 'META_YIELD') return total;
          const parsedQty = parseNumberInput(ing.quantity);
          return total + (getAveragePrice(ing.itemName, new Set(visited)).price * parsedQty);
        }, 0);
      };

      const getAveragePrice = (itemName, visited = new Set()) => {
        const searchStr = String(itemName || '').toLowerCase();

        // Cek apakah bahan ini sebenarnya adalah Sub-Recipe
        const isRecipeMatch = recipes.find(r =>
          `[resep] ${String(r.menuName || '').toLowerCase()}` === searchStr ||
          String(r.menuName || '').toLowerCase() === searchStr
        );
        if (isRecipeMatch) {
          const totalHPP = calculateRecipeHPP(isRecipeMatch.id, visited);
          const yieldData = getRecipeYield(isRecipeMatch);
          return { price: totalHPP / yieldData.qty, status: 'sub_recipe', details: { type: 'sub_recipe', recipe: isRecipeMatch, totalHPP, yieldData } };
        }

        const { startDate, endDate } = getTwoMonthsRange(inventoryFilterMonth);
        const recentPurchases = purchases.filter(p => {
          const pDate = new Date(p.date);
          return String(p.itemName || '').toLowerCase() === searchStr && pDate >= startDate && pDate < endDate;
        });

        if (recentPurchases.length > 0) {
          const tCost = recentPurchases.reduce((s, p) => s + (Number(p.totalPrice) || 0), 0);
          const tQty = recentPurchases.reduce((s, p) => s + (Number(p.quantity) || 0), 0);
          let price = tQty > 0 ? tCost / tQty : 0;
          return { price: isNaN(price) ? 0 : price, status: 'avg_2_months', details: { type: 'avg_2_months', transactions: recentPurchases, totalCost: tCost, totalQty: tQty } };
        }

        const allPurchases = purchases.filter(p => String(p.itemName || '').toLowerCase() === searchStr).sort((a, b) => new Date(b.date) - new Date(a.date));
        if (allPurchases.length > 0) {
          const tCost = Number(allPurchases[0].totalPrice) || 0;
          const tQty = Number(allPurchases[0].quantity) || 0;
          let price = tQty > 0 ? tCost / tQty : 0;
          return { price: isNaN(price) ? 0 : price, status: 'latest_fallback', details: { type: 'latest_fallback', transactions: [allPurchases[0]], totalCost: tCost, totalQty: tQty } };
        }
        return { price: 0, status: 'no_data', details: { type: 'no_data', transactions: [], totalCost: 0, totalQty: 0 } };
      };

      const uniqueItems = useMemo(() => {
        const items = new Map();
        purchases.forEach(p => {
          const nameLower = String(p.itemName || '').toLowerCase();
          if (!items.has(nameLower)) items.set(nameLower, { name: p.itemName, unit: p.unit });
        });

        // Tambahkan resep sebagai bahan jadi (hanya Bahan 1/2 Jadi)
        recipes.forEach(r => {
          if (r.recipeType !== 'sub') return;
          const resepName = `[Resep] ${r.menuName}`;
          if (!items.has(resepName.toLowerCase())) {
            const yieldData = getRecipeYield(r);
            items.set(resepName.toLowerCase(), { name: resepName, unit: yieldData.unit });
          }
        });

        return Array.from(items.values());
      }, [purchases, recipes]);

      // ==========================================
      // INVENTORY CALCULATIONS
      // ==========================================
      const inventoryData = useMemo(() => {
        const stockMap = new Map();

        const ensureItem = (name, rawName) => {
          if (!stockMap.has(name)) {
            const uItem = uniqueItems.find(u => u.name.toLowerCase() === name);
            stockMap.set(name, {
              name: rawName,
              unit: uItem ? uItem.unit : '',
              stokAwal: 0,
              masuk: 0,
              keluarSales: 0,
              keluarAdjustments: 0
            });
          }
          return stockMap.get(name);
        };

        const filterYearMonth = inventoryFilterMonth;

        const getBucket = (dateStr) => {
          if (!filterYearMonth) return 'current';
          if (!dateStr) return 'current';
          // Handle various date formats from Google Sheets (ISO with timezone, or plain string)
          let d = '';
          if (typeof dateStr === 'string' && dateStr.includes('T')) {
            // ISO format like "2025-12-31T17:00:00.000Z" — parse to local date
            const dt = new Date(dateStr);
            const y = dt.getFullYear();
            const m = String(dt.getMonth() + 1).padStart(2, '0');
            d = `${y}-${m}`;
          } else {
            d = String(dateStr).substring(0, 7);
          }
          if (d < filterYearMonth) return 'awal';
          if (d === filterYearMonth) return 'current';
          return 'future';
        };

        // 1. Total In from Purchases
        purchases.forEach(p => {
          const name = String(p.itemName || '').toLowerCase();
          const bucket = getBucket(p.date);
          if (bucket === 'future') return;

          const item = ensureItem(name, p.itemName);
          const qty = Number(p.quantity) || 0;
          if (bucket === 'awal') item.stokAwal += qty;
          else item.masuk += qty;
        });

        // 2. Total Out from Sales
        sales.forEach(sale => {
          const bucket = getBucket(sale.date);
          if (bucket === 'future') return;

          const recipe = recipes.find(r => 
            String(r.id) === String(sale.recipeId) || 
            String(r.menuName).toLowerCase() === String(sale.recipeId).toLowerCase() ||
            String(r.menuName).toLowerCase() === String(sale.menuName).toLowerCase()
          );
          if (recipe) {
            const qtySold = Number(sale.quantitySold) || 0;
            const deductIngredients = (currentRecipe, multiplier, bucketStr, visited = new Set()) => {
              if (!currentRecipe || visited.has(currentRecipe.id)) return;
              visited.add(currentRecipe.id);

              currentRecipe.ingredients.forEach(ing => {
                const nameStr = String(ing.itemName || '').toLowerCase();
                const qtyUsed = parseNumberInput(ing.quantity) * multiplier;

                const subRecipe = recipes.find(r =>
                  `[resep] ${String(r.menuName || '').toLowerCase()}` === nameStr ||
                  String(r.menuName || '').toLowerCase() === nameStr
                );

                if (subRecipe) {
                  const yieldData = getRecipeYield(subRecipe);
                  const subMultiplier = yieldData.qty > 0 ? (qtyUsed / yieldData.qty) : 0;
                  deductIngredients(subRecipe, subMultiplier, bucketStr, new Set(visited));
                } else {
                  const item = ensureItem(nameStr, ing.itemName);
                  if (bucketStr === 'awal') item.stokAwal -= qtyUsed;
                  else item.keluarSales += qtyUsed;
                }
              });
            };

            deductIngredients(recipe, qtySold, bucket);
          }
        });

        // 3. Manual Adjustments (Positive = deduction/rusak/terbuang)
        adjustments.forEach(adj => {
          const bucket = getBucket(adj.date);
          if (bucket === 'future') return;

          const name = String(adj.itemName || '').toLowerCase();
          const qtyAdj = Number(adj.quantity) || 0;
          const item = ensureItem(name, adj.itemName);

          if (bucket === 'awal') item.stokAwal -= qtyAdj;
          else item.keluarAdjustments += qtyAdj;
        });

        return Array.from(stockMap.values())
          .filter(item => item.name && item.name.trim() !== '')
          .map(item => {
            const priceObj = getAveragePrice(item.name);
            return {
              ...item,
              price: priceObj.price,
              priceDetails: priceObj.details,
              stokAkhir: item.stokAwal + item.masuk - item.keluarSales - item.keluarAdjustments
            };
          }).sort((a, b) => a.name.localeCompare(b.name));
      }, [purchases, recipes, sales, adjustments, uniqueItems, inventoryFilterMonth]);

      const getFlatRequiredIngredients = (recipeId, multiplier = 1) => {
        const reqMap = new Map();
        const traverse = (recId, mult, visited = new Set()) => {
          if (visited.has(recId)) return;
          visited.add(recId);
          const r = recipes.find(rec => rec.id === recId);
          if (!r) return;
          r.ingredients.forEach(ing => {
            if (ing.id === 'META_YIELD') return;
            const qty = parseNumberInput(ing.quantity) * mult;
            if (qty <= 0) return;
            const searchStr = String(ing.itemName || '').toLowerCase();
            const subRecipe = recipes.find(rec =>
              String(rec.id) === String(ing.itemName) ||
              `[resep] ${String(rec.menuName || '').toLowerCase()}` === searchStr ||
              String(rec.menuName || '').toLowerCase() === searchStr
            );
            if (subRecipe) {
              const subYieldQty = parseNumberInput(subRecipe.yieldQty) || 1;
              traverse(subRecipe.id, qty / subYieldQty, new Set(visited));
            } else {
              reqMap.set(searchStr, (reqMap.get(searchStr) || 0) + qty);
            }
          });
        };
        traverse(recipeId, multiplier);
        return reqMap;
      };

      // Returns max yieldQty of a recipe based on inventory stock
      const calculateMaxPortions = (recipeId) => {
        const recipe = recipes.find(r => r.id === recipeId);
        if (!recipe || !recipe.ingredients || recipe.ingredients.length === 0) return 0;

        const reqMap = getFlatRequiredIngredients(recipe.id);

        if (reqMap.size === 0) return 0;

        let maxBatches = Infinity;
        reqMap.forEach((reqQty, ingName) => {
          const invItem = inventoryData.find(item => String(item.name).toLowerCase() === ingName);
          const stock = invItem ? invItem.stokAkhir : 0;
          if (reqQty > 0) {
            maxBatches = Math.min(maxBatches, stock / reqQty);
          }
        });

        if (maxBatches === Infinity || maxBatches < 0) return 0;
        const yieldMeta = recipe.ingredients?.find(i => i.id === 'META_YIELD') || { qty: recipe.yieldQty || 1 };
        const yieldQty = parseNumberInput(yieldMeta.qty) || 1;
        return Math.floor(maxBatches * yieldQty);

      // --- IMAGES ---
      const compressImageToBase64 = (file, callback) => {
        const reader = new FileReader();
        reader.onload = function (event) {
          const img = new Image();
          img.onload = function () {
            try {
              const canvas = document.createElement('canvas');
              const ctx = canvas.getContext('2d');

              let quality = 0.8;
              let scale = 1.0;
              const maxDimension = 600;
              if (img.width > maxDimension || img.height > maxDimension) {
                if (img.width > img.height) {
                  scale = maxDimension / img.width;
                } else {
                  scale = maxDimension / img.height;
                }
              }

              let currentWidth = img.width * scale;
              let currentHeight = img.height * scale;
              let base64String = "";
              let isSafe = false;

              // Google Sheets cell limit is 50,000. We target < 49,000 for safety.
              const MAX_CHARS = 49000;

              for (let attempt = 0; attempt < 10; attempt++) {
                canvas.width = currentWidth;
                canvas.height = currentHeight;

                ctx.fillStyle = "white"; // Fallback for transparent PNGs
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0, currentWidth, currentHeight);

                base64String = canvas.toDataURL('image/jpeg', quality);

                if (base64String.length <= MAX_CHARS) {
                  isSafe = true;
                  break;
                }

                quality -= 0.1;
                if (quality < 0.3) quality = 0.3;
                currentWidth *= 0.8;
                currentHeight *= 0.8;
              }

              if (!isSafe) {
                canvas.width = 100;
                canvas.height = 100;
                ctx.drawImage(img, 0, 0, 100, 100);
                base64String = canvas.toDataURL('image/jpeg', 0.5);
              }

              callback(base64String);
            } catch (err) {
              console.error("Image compression error:", err);
              callback(null);
            }
          };
          img.onerror = function() {
             console.error("Invalid image file");
             callback(null);
          }
          img.src = event.target.result;
        };
        reader.onerror = function() {
           console.error("FileReader error");
           callback(null);
        }
        reader.readAsDataURL(file);
      };

      const handleImageUpload = (recipeId, e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        // Cek ukuran file > 10MB
        if (file.size > 10 * 1024 * 1024) {
           alert("File terlalu besar! Maksimal ukuran gambar adalah 10 MB.");
           const input = document.getElementById(`file-upload-${recipeId}`);
           if (input) input.value = ''; // Reset input
           return;
        }

        setIsUploadingImage(true);
        compressImageToBase64(file, (compressedBase64) => {
          if (!compressedBase64) {
             alert("Gagal mengunggah gambar. Pastikan format file didukung (JPG/PNG).");
             setIsUploadingImage(false);
             const input = document.getElementById(`file-upload-${recipeId}`);
             if (input) input.value = ''; // Reset input
             return;
          }
          const recipe = recipes.find(r => r.id === recipeId);
          if (recipe) {
            const updatedRecipe = { ...recipe, imageUrl: compressedBase64 };
            handleSaveRecipe(recipeId, updatedRecipe);
            
            // Perbarui state form edit agar gambar langsung muncul tanpa harus keluar modal
            if (editingRecipeData && editingRecipeData.id === recipeId) {
              setEditingRecipeData(updatedRecipe);
            }
          }
          setIsUploadingImage(false);
          const input = document.getElementById(`file-upload-${recipeId}`);
          if (input) input.value = ''; // Reset input agar gambar yang sama bisa diunggah lagi
        });
      };



      // --- RECIPES ---
      const handleAddMenu = (e) => {
        e.preventDefault();
        if (!newMenuName.trim()) {
          alert('Silakan ketik nama menu baru terlebih dahulu di kolom pengisian!');
          return;
        }
        const recipeData = { id: Date.now(), menuName: newMenuName, targetMarginPercent: 0, yieldQty: 1, yieldUnit: 'porsi', recipeType: 'final', isActive: true, menuCategory: '', imageUrl: '', ingredients: [] };
        setRecipes([...recipes, recipeData]);
        sendApiRequest('addRecipe', recipeData);
        setNewMenuName('');
      };

      const handleEditMenuName = (id, newName) => {
        const newRecipes = recipes.map(r => r.id === id ? { ...r, menuName: newName } : r);
        setRecipes(newRecipes);
      };

      const handleSaveRecipe = (recipeId, overrideData = null) => {
        const recipe = overrideData || recipes.find(r => r.id === recipeId);
        if (recipe) {
          const safeIngs = Array.isArray(recipe.ingredients) ? recipe.ingredients : [];
          const cleanedIngredients = safeIngs.map(i => {
            const uItem = uniqueItems.find(u => u.name === i.itemName);
            return {
              ...i,
              unit: uItem ? uItem.unit : (i.unit || ''),
              quantity: parseNumberInput(i.quantity)
            };
          });

          const parsedYield = parseNumberInput(recipe.yieldQty) || 1;

          const payload = {
            ...recipe,
            ingredients: [
              ...cleanedIngredients,
              { id: 'META_YIELD', qty: parsedYield, unit: recipe.yieldUnit || 'porsi', type: recipe.recipeType || 'final' },
              { itemName: 'META_STATUS', quantity: recipe.isActive === false ? 'false' : 'true' },
              { itemName: 'META_CATEGORY_ORDER', quantity: JSON.stringify(recipe.customCategoryOrder || []) },
              { itemName: 'META_MENU_CATEGORY', quantity: recipe.menuCategory || '' }
            ]
          };
          const isNewRecipe = !recipes.some(r => r.id === recipeId);
          if (isNewRecipe) {
            sendApiRequest('addRecipe', payload);
          } else {
            sendApiRequest('updateRecipe', payload);
          }

          setRecipes(prevRecipes => {
            const savedRecipe = { ...recipe, ingredients: cleanedIngredients.map(i => ({ ...i, quantity: formatQtyInput(i.quantity) })), yieldQty: formatQtyInput(parsedYield) };
            if (prevRecipes.some(r => r.id === recipeId)) {
                return prevRecipes.map(r => r.id === recipeId ? savedRecipe : r);
            } else {
                return [...prevRecipes, savedRecipe];
            }
          });
        }
      };

      const handleDeleteRecipe = (id) => {
        setRecipes(recipes.filter(r => r.id !== id));
        sendApiRequest('deleteRecipe', { id });
      };

      const handleAddIngredient = (recipeId, e) => {
        e.preventDefault();
        
        const nameInput = document.getElementById(`new-ing-name-${recipeId}`);
        const qtyInput = document.getElementById(`new-ing-qty-${recipeId}`);
        
        const currentName = nameInput ? nameInput.value : newIngredient.itemName;
        const currentQty = qtyInput ? qtyInput.value : newIngredient.quantity;

        const parsedQty = parseNumberInput(currentQty);

        if (!currentName || isNaN(parsedQty) || parsedQty <= 0) {
          alert("Pastikan nama bahan terisi dan kuantitas adalah angka lebih dari 0!");
          return;
        }

        if (editingRecipeData && editingRecipeData.id === recipeId) {
          setEditingRecipeData({ ...editingRecipeData, ingredients: [...editingRecipeData.ingredients, { id: Date.now(), itemName: currentName, quantity: formatQtyInput(parsedQty) }] });
        }

        setNewIngredient({ itemName: '', quantity: '' });
        if (nameInput) nameInput.value = '';
        if (qtyInput) qtyInput.value = '';
        setSelectedRecipeId(null);
      };

      const handleDeleteIngredient = (recipeId, ingId) => {
        if (editingRecipeData && editingRecipeData.id === recipeId) {
          setEditingRecipeData({ ...editingRecipeData, ingredients: editingRecipeData.ingredients.filter(i => i.id !== ingId) });
        }
      };

      const handleEditIngredientQty = (recipeId, ingId, newQty) => {
        if (editingRecipeData && editingRecipeData.id === recipeId) {
          setEditingRecipeData({ ...editingRecipeData, ingredients: editingRecipeData.ingredients.map(i => i.id === ingId ? { ...i, quantity: newQty } : i) });
        }
      };

      const handleEditIngredientField = (recipeId, ingId, field, value) => {
        if (editingRecipeData && editingRecipeData.id === recipeId) {
          setEditingRecipeData({ ...editingRecipeData, ingredients: editingRecipeData.ingredients.map(i => i.id === ingId ? { ...i, [field]: value } : i) });
        }
      };

      const handleUpdateYield = (id, qty, unit) => {
        if (editingRecipeData && editingRecipeData.id === id) {
          setEditingRecipeData({ ...editingRecipeData, yieldQty: qty, yieldUnit: unit });
        }
      };

      const handleUpdateType = (id, type) => {
        if (editingRecipeData && editingRecipeData.id === id) {
          setEditingRecipeData({ ...editingRecipeData, recipeType: type });
        }
      };

      const handleUpdateMargin = (recipeId, newMargin) => {
        if (editingRecipeData && editingRecipeData.id === recipeId) {
          setEditingRecipeData({ ...editingRecipeData, targetMarginPercent: Number(newMargin) });
        }
      };

      const handleSalesSimulationChange = (recipeId, val) => {
        setSalesSimulation(prev => ({ ...prev, [recipeId]: val }));
      };

      // --- OVERHEAD ---
      const handleAddOverhead = (e) => {
        e.preventDefault();
        const parsedAmount = parseNumberInput(newOverhead.amount);
        if (!newOverhead.name || parsedAmount <= 0) return;
        const overheadData = { id: Date.now(), name: newOverhead.name, amount: parsedAmount };
        setOverheadCosts([...overheadCosts, overheadData]);
        sendApiRequest('addOverhead', overheadData);
        setNewOverhead({ name: '', amount: '' });
      };

      const handleDeleteOverhead = (id) => {
        setConfirmDialog({
          title: 'Hapus Biaya Overhead',
          message: 'Apakah Anda yakin ingin menghapus data biaya overhead ini?',
          type: 'danger',
          confirmText: 'Hapus',
          onConfirm: () => {
            setOverheadCosts(overheadCosts.filter(c => c.id !== id));
            sendApiRequest('deleteOverhead', { id });
          }
        });
      };

      // ==========================================
      // DRAG AND DROP INGREDIENTS
      // ==========================================
      const handleDragStart = (e, recipeId, ingId, sourceCat) => {
        e.dataTransfer.setData('text/plain', JSON.stringify({ type: 'ingredient', recipeId, ingId, sourceCat }));
        e.dataTransfer.effectAllowed = 'move';
      };

      const handleCategoryDragStart = (e, recipeId, cat) => {
        e.dataTransfer.setData('text/plain', JSON.stringify({ type: 'category', recipeId, cat }));
        e.dataTransfer.effectAllowed = 'move';
      };

      const handleDropOnCategory = (e, targetRecipeId, targetCat) => {
        e.preventDefault();
        try {
          const data = JSON.parse(e.dataTransfer.getData('text/plain'));
          if (data.recipeId !== targetRecipeId) return;

          if (data.type === 'category') {
            if (editingRecipeData && editingRecipeData.id === targetRecipeId) {
              const currentOrder = editingRecipeData.customCategoryOrder || [];
              const activeCats = Object.keys(editingRecipeData.ingredients.reduce((acc, ing) => {
                const c = (ing.category || 'OTHERS').toUpperCase();
                acc[c] = true;
                return acc;
              }, {}));

              let order = [...new Set([...currentOrder, ...activeCats])];

              const dragIdx = order.indexOf(data.cat);
              let dropIdx = order.indexOf(targetCat);

              if (dragIdx !== -1) {
                if (dropIdx === -1) dropIdx = order.length;
                const [dragged] = order.splice(dragIdx, 1);
                order.splice(dropIdx, 0, dragged);
              }

              setEditingRecipeData({ ...editingRecipeData, customCategoryOrder: order });
            }
            return;
          }

          if (editingRecipeData && editingRecipeData.id === targetRecipeId) {
            const updatedIngs = editingRecipeData.ingredients.map(ing => {
              if (ing.id === data.ingId) {
                return { ...ing, category: targetCat === 'OTHERS' ? '' : targetCat };
              }
              return ing;
            });
            setEditingRecipeData({ ...editingRecipeData, ingredients: updatedIngs });
          }
        } catch (err) {
          console.error('DND Error', err);
        }
      };

      const handleDropOnIngredient = (e, targetRecipeId, targetIngId, targetCat) => {
        e.preventDefault();
        e.stopPropagation();
        try {
          const data = JSON.parse(e.dataTransfer.getData('text/plain'));
          if (data.recipeId !== targetRecipeId) return;

          if (data.type === 'category') {
            if (editingRecipeData && editingRecipeData.id === targetRecipeId) {
              const currentOrder = editingRecipeData.customCategoryOrder || [];
              const activeCats = Object.keys(editingRecipeData.ingredients.reduce((acc, ing) => {
                const c = (ing.category || 'OTHERS').toUpperCase();
                acc[c] = true;
                return acc;
              }, {}));

              let order = [...new Set([...currentOrder, ...activeCats])];
              const dragIdx = order.indexOf(data.cat);
              let dropIdx = order.indexOf(targetCat);

              if (dragIdx !== -1) {
                if (dropIdx === -1) dropIdx = order.length;
                const [dragged] = order.splice(dragIdx, 1);
                order.splice(dropIdx, 0, dragged);
              }

              setEditingRecipeData({ ...editingRecipeData, customCategoryOrder: order });
            }
            return;
          }

          if (editingRecipeData && editingRecipeData.id === targetRecipeId) {
            const ings = [...editingRecipeData.ingredients];
            const dragIdx = ings.findIndex(i => i.id === data.ingId);
            const dropIdx = ings.findIndex(i => i.id === targetIngId);

            if (dragIdx !== -1 && dropIdx !== -1) {
              const [draggedItem] = ings.splice(dragIdx, 1);
              draggedItem.category = targetCat === 'OTHERS' ? '' : targetCat;
              const newDropIdx = ings.findIndex(i => i.id === targetIngId);
              ings.splice(newDropIdx, 0, draggedItem);
              setEditingRecipeData({ ...editingRecipeData, ingredients: ings });
            }
          }
        } catch (err) {
          console.error('DND Error', err);
        }
      };

      // ==========================================
      // UI RENDER
      // ==========================================

      if (!isLoggedIn) {
        return (
          <div className="min-h-screen bg-gradient-to-br from-slate-900 via-slate-800 to-emerald-900 flex items-center justify-center p-4">
            <div className="bg-white/10 backdrop-blur-xl border border-white/20 p-8 rounded-2xl w-full max-w-sm shadow-2xl relative overflow-hidden">
              <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-emerald-400 to-teal-500"></div>
              <div className="text-center mb-8">
                <div className="inline-flex items-center justify-center w-16 h-16 rounded-full bg-emerald-500/20 text-emerald-400 mb-4 shadow-inner">
                  <i className="fas fa-lock text-2xl"></i>
                </div>
                <h1 className="text-2xl font-bold text-white mb-2 tracking-tight">FoodCost Pro</h1>
                <p className="text-emerald-200/80 text-sm">Silakan masukkan username dan sandi untuk mengakses data.</p>
              </div>

              <form onSubmit={(e) => {
                e.preventDefault();
                setIsLoggingIn(true);
                fetchData(username, password);
              }}>
                <div className="mb-4 relative">
                  <i className="fas fa-user absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                  <input
                    type="text"
                    placeholder="Username"
                    className="w-full pl-12 pr-4 py-3 bg-white/5 border border-white/10 rounded-xl outline-none focus:border-emerald-500 focus:bg-white/10 text-white placeholder-slate-400 transition-all"
                    value={username}
                    onChange={e => setUsername(e.target.value)}
                    required
                  />
                </div>
                <div className="mb-6 relative">
                  <i className="fas fa-key absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                  <input
                    type="password"
                    placeholder="Kata Sandi"
                    className="w-full pl-12 pr-4 py-3 bg-white/5 border border-white/10 rounded-xl outline-none focus:border-emerald-500 focus:bg-white/10 text-white placeholder-slate-400 transition-all"
                    value={password}
                    onChange={e => setPassword(e.target.value)}
                    required
                  />
                </div>

                {loginError && <div className="mb-4 text-red-400 text-sm text-center bg-red-400/10 p-2 rounded-lg border border-red-400/20">{loginError}</div>}

                <button
                  type="submit"
                  disabled={isLoggingIn}
                  className="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-bold py-3 px-4 rounded-xl shadow-lg shadow-emerald-500/30 transition-all flex items-center justify-center gap-2 disabled:opacity-50"
                >
                  {isLoggingIn ? <i className="fas fa-circle-notch fa-spin"></i> : <i className="fas fa-sign-in-alt"></i>}
                  {isLoggingIn ? 'Memverifikasi...' : 'Masuk Sistem'}
                </button>
              </form>
            </div>
          </div>
        );
      }

      if (isLoading) {
        return (
          <div className="min-h-screen flex items-center justify-center bg-slate-100">
            <div className="text-center bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
              <i className="fas fa-spinner fa-spin text-5xl text-emerald-600 mb-4 block"></i>
              <p className="text-slate-600 font-bold text-lg">Menyinkronkan Database...</p>
              <p className="text-slate-400 text-sm mt-2">Menarik data dari Google Spreadsheet</p>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen p-4 md:p-8 font-sans pb-20">
          <div className="max-w-[1600px] px-4 mx-auto space-y-6">

            {/* Loading / Save Overlay */}
            {saveToast && (
              <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-[99999] flex items-center justify-center animate-in fade-in duration-200">
                <div className="bg-white p-8 rounded-3xl shadow-2xl flex flex-col items-center justify-center min-w-[280px] animate-in zoom-in-95 duration-300">
                  {saveToast.type === 'loading' && <i className="fas fa-circle-notch fa-spin text-5xl mb-5 text-emerald-500"></i>}
                  {saveToast.type === 'success' && <i className="fas fa-check-circle text-5xl mb-5 text-emerald-500 animate-in zoom-in"></i>}
                  {saveToast.type === 'error' && <i className="fas fa-exclamation-circle text-5xl mb-5 text-rose-500 animate-in zoom-in"></i>}
                  <span className="font-black text-xl text-slate-800 text-center">{saveToast.message}</span>
                </div>
              </div>
            )}

            {/* Confirm Dialog Overlay */}
            {confirmDialog && (
              <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[999999] flex items-center justify-center animate-in fade-in duration-200">
                <div className="bg-white rounded-3xl shadow-2xl w-11/12 max-w-sm p-6 animate-in zoom-in-95 duration-300">
                  <div className="flex flex-col items-center text-center">
                    <div className={`w-16 h-16 rounded-full flex items-center justify-center mb-4 ${confirmDialog.type === 'danger' ? 'bg-rose-100 text-rose-500' : confirmDialog.type === 'warning' ? 'bg-amber-100 text-amber-500' : 'bg-emerald-100 text-emerald-500'}`}>
                      <i className={`fas text-3xl ${confirmDialog.type === 'danger' ? 'fa-trash-alt' : confirmDialog.type === 'warning' ? 'fa-exclamation-triangle' : confirmDialog.type === 'success' ? 'fa-save' : 'fa-info-circle'}`}></i>
                    </div>
                    <h3 className="text-xl font-black text-slate-800 mb-2">{confirmDialog.title || 'Konfirmasi'}</h3>
                    <p className="text-slate-500 mb-6 font-medium">{confirmDialog.message}</p>
                    <div className="flex gap-3 w-full">
                      <button onClick={() => setConfirmDialog(null)} className="flex-1 py-3 px-4 bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold rounded-xl transition-colors">
                        Batal
                      </button>
                      <button onClick={() => { confirmDialog.onConfirm(); setConfirmDialog(null); }} className={`flex-1 py-3 px-4 font-bold rounded-xl text-white transition-colors ${confirmDialog.type === 'danger' ? 'bg-rose-500 hover:bg-rose-600' : confirmDialog.type === 'warning' ? 'bg-amber-500 hover:bg-amber-600' : 'bg-emerald-500 hover:bg-emerald-600'}`}>
                        {confirmDialog.confirmText || 'Ya'}
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* Header */}
            <header className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 flex justify-between items-center print-hide">
              <div className="flex items-center gap-4">
                <div className="bg-emerald-100 p-4 rounded-xl text-emerald-600">
                  <i className="fas fa-database text-3xl px-2"></i>
                </div>
                <div>
                  <h1 className="text-2xl font-black text-slate-900 tracking-tight">FoodCost Pro</h1>
                  <p className="text-emerald-600 font-bold text-sm"><i className="fas fa-cloud-check"></i> Connected to Google Sheets</p>
                </div>
              </div>
              <div className="flex items-center gap-4">
                <button onClick={() => fetchData(username, password)} className="text-slate-400 hover:text-emerald-500 transition-colors" title="Muat Ulang Data">
                  <i className={`fas fa-sync-alt ${isRefreshing ? 'fa-spin text-emerald-500' : ''}`}></i>
                </button>
                <div className="flex items-center gap-3 bg-slate-50 px-3 py-2 rounded-xl border border-slate-200">
                  <div className="h-8 w-8 rounded-full bg-emerald-100 flex items-center justify-center text-emerald-600 font-bold text-sm border-2 border-white shadow-sm ring-2 ring-emerald-50">
                    {username ? username.substring(0, 2).toUpperCase() : 'U'}
                  </div>
                  <div className="hidden md:block">
                    <p className="text-sm font-bold text-slate-700 leading-tight">{username}</p>
                    <p className="text-[10px] font-bold uppercase text-emerald-600">{userRole}</p>
                  </div>
                  <button onClick={handleLogout} className="text-slate-400 hover:text-red-500 transition-colors ml-1" title="Keluar (Logout)">
                    <i className="fas fa-sign-out-alt"></i>
                  </button>
                </div>
              </div>
            </header>

            {/* Tab Navigation */}
            <div className="flex space-x-2 bg-white p-2 rounded-xl shadow-sm border border-slate-200 overflow-x-auto print-hide">
              <button onClick={() => setActiveTab('purchases')} className={`flex-1 flex justify-center items-center gap-2 py-3 px-4 rounded-lg font-bold transition-all whitespace-nowrap ${activeTab === 'purchases' ? 'bg-slate-800 text-white shadow-md' : 'text-slate-500 hover:bg-slate-50'}`}>
                <i className="fas fa-shopping-cart"></i> 1. Data Bahan Baku
              </button>
              {userRole === 'admin' && (
                <button onClick={() => setActiveTab('overhead')} className={`flex-1 flex justify-center items-center gap-2 py-3 px-4 rounded-lg font-bold transition-all whitespace-nowrap ${activeTab === 'overhead' ? 'bg-slate-800 text-white shadow-md' : 'text-slate-500 hover:bg-slate-50'}`}>
                  <i className="fas fa-file-invoice-dollar"></i> 2. Biaya Operasional
                </button>
              )}
              {userRole === 'admin' && (
                <button onClick={() => setActiveTab('recipes')} className={`flex-1 flex justify-center items-center gap-2 py-3 px-4 rounded-lg font-bold transition-all whitespace-nowrap ${activeTab === 'recipes' ? 'bg-slate-800 text-white shadow-md' : 'text-slate-500 hover:bg-slate-50'}`}>
                  <i className="fas fa-utensils"></i> 3. Costing & Harga Jual
                </button>
              )}
              <button onClick={() => setActiveTab('simulasi')} className={`flex-1 flex justify-center items-center gap-2 py-3 px-4 rounded-lg font-bold transition-all whitespace-nowrap ${activeTab === 'simulasi' ? 'bg-emerald-600 text-white shadow-md' : 'text-slate-500 hover:bg-emerald-50 hover:text-emerald-600'}`}>
                <i className="fas fa-chart-pie"></i> 4. Simulasi Bisnis
              </button>
              <button onClick={() => setActiveTab('katalog')} className={`flex-1 flex justify-center items-center gap-2 py-3 px-4 rounded-lg font-bold transition-all whitespace-nowrap ${activeTab === 'katalog' ? 'bg-emerald-600 text-white shadow-md' : 'text-slate-500 hover:bg-emerald-50 hover:text-emerald-600'}`}>
                <i className="fas fa-search"></i> 5. Katalog Menu
              </button>
              <button onClick={() => setActiveTab('inventory')} className={`flex-1 flex justify-center items-center gap-2 py-3 px-4 rounded-lg font-bold transition-all whitespace-nowrap ${activeTab === 'inventory' ? 'bg-orange-600 text-white shadow-md' : 'text-slate-500 hover:bg-orange-50 hover:text-orange-600'}`}>
                <i className="fas fa-boxes"></i> 6. Inventory & Stok
              </button>
              {userRole === 'admin' && (
                <button onClick={() => setActiveTab('users')} className={`flex-1 flex justify-center items-center gap-2 py-3 px-4 rounded-lg font-bold transition-all whitespace-nowrap ${activeTab === 'users' ? 'bg-blue-600 text-white shadow-md' : 'text-slate-500 hover:bg-blue-50 hover:text-blue-600'}`}>
                  <i className="fas fa-users-cog"></i> 7. Pengaturan Akun
                </button>
              )}
            </div>

            {/* TAB 1: PEMBELIAN */}
            {activeTab === 'purchases' && (
              <div className="grid grid-cols-1 lg:grid-cols-4 gap-6">
                <div className="lg:col-span-1 bg-white p-6 rounded-2xl shadow-sm border border-slate-200 h-fit">
                  <h2 className="text-lg font-bold mb-4 border-b pb-2 flex items-center gap-2">
                    <i className="fas fa-plus text-lg"></i> Catat Pembelian
                  </h2>
                  <form onSubmit={handleAddPurchase} className="space-y-4">
                    <div><label className="text-sm font-semibold">Tanggal</label><input type="date" className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg outline-none" value={newPurchase.date} onChange={e => setNewPurchase({ ...newPurchase, date: e.target.value })} required /></div>
                    <div>
                      <label className="text-sm font-semibold">Nama Bahan</label>
                      <input
                        type="text"
                        list="existing-items"
                        placeholder="Ketik untuk mencari atau menambah baru..."
                        className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:border-emerald-500"
                        value={newPurchase.itemName}
                        onChange={e => {
                          const val = e.target.value;
                          const existing = uniqueItems.find(u => u.name.toLowerCase() === val.toLowerCase());
                          if (existing) {
                            setNewPurchase({ ...newPurchase, itemName: existing.name, unit: existing.unit });
                          } else {
                            setNewPurchase({ ...newPurchase, itemName: val });
                          }
                        }}
                        required
                      />
                      <datalist id="existing-items">
                        {uniqueItems.map((item, idx) => (
                          <option key={idx} value={item.name} />
                        ))}

                          <i className="fas fa-check-circle"></i> Resep untuk {formatNum(getRecipeYield(recipe).qty)} {getRecipeYield(recipe).unit}

                      </div>

                      <div className="grid grid-cols-2 gap-4 mb-6">
                        <div className="bg-rose-50 border border-rose-100 rounded-xl p-4">

                          <p className="text-xl font-black text-rose-600">{formatRp(hppBahan)}</p>
                        </div>
                        <div className="bg-emerald-50 border border-emerald-100 rounded-xl p-4">
                          <p className="text-xs font-bold text-emerald-500 uppercase tracking-wider mb-1">Harga Jual Ideal</p>
                          <p className="text-xl font-black text-emerald-600">{formatRp(hargaJualIdeal)}</p>
                        </div>
                        <div className="bg-sky-50 border border-sky-100 rounded-xl p-4 col-span-2">
                          <div className="flex justify-between items-center">
                            <div>
                              <p className="text-xs font-bold text-sky-500 uppercase tracking-wider mb-1">Profit Bersih / Porsi</p>
                              <p className="text-xl font-black text-sky-600">{formatRp(profitPerPorsi)}</p>

                            <div className="text-right">

                          </div>

                                const stock = invItem ? invItem.stokAkhir : 0;
                                const unit = invItem ? invItem.unit : (uniqueItems.find(u => u.name.toLowerCase() === ingName)?.unit || '-');
                                const isLacking = stock < reqQty;
                                const shortage = isLacking ? reqQty - stock : 0;

                                return (
                                  <div key={idx} className={`p-3 rounded-lg border ${isLacking ? 'bg-rose-50 border-rose-200' : 'bg-white border-slate-200'}`}>

                                      <span className={`text-[10px] font-bold px-2 py-1 rounded ${isLacking ? 'bg-rose-500 text-white' : 'bg-emerald-100 text-emerald-700'}`}>

                      </div>

                        <i className="fas fa-save"></i> Simpan Penjualan

                    </form>

                    </h2>
                    <form onSubmit={handleAddAdjustment} className="space-y-4">
                      <div><label className="text-sm font-semibold">Tanggal</label><input type="date" className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg outline-none" value={newAdjustment.date} onChange={e => setNewAdjustment({ ...newAdjustment, date: e.target.value })} required /></div>
                      <div>
                        <label className="text-sm font-semibold">Bahan Baku</label>
                        <input type="text" list="existing-items-adj" placeholder="Ketik nama bahan..." className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:border-emerald-500" value={newAdjustment.itemName} onChange={e => setNewAdjustment({ ...newAdjustment, itemName: e.target.value })} required />
                        <datalist id="existing-items-adj">
                          {uniqueItems.map((item, idx) => <option key={idx} value={item.name} />)}
                        </datalist>
                      </div>
                      <div className="flex gap-2">
                        <div className="flex-1">
                          <label className="text-sm font-semibold">Jumlah (Qty)</label>
                          <input type="text" inputMode="decimal" placeholder="Contoh: 5" className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:border-emerald-500" value={newAdjustment.quantity} onChange={e => setNewAdjustment({ ...newAdjustment, quantity: formatQtyInput(e.target.value) })} required />
                        </div>
                        <div className="flex-1">
                          <label className="text-sm font-semibold">Alasan</label>
                          <input type="text" placeholder="Contoh: Basi, Tumpah" className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:border-emerald-500" value={newAdjustment.reason} onChange={e => setNewAdjustment({ ...newAdjustment, reason: e.target.value })} required />

                      <button type="submit" className="w-full bg-orange-600 hover:bg-orange-700 text-white p-3 rounded-lg font-bold flex justify-center items-center gap-2">

                    <div className="flex flex-wrap items-center gap-3 w-full md:w-auto print-hide">
                      <div className="flex items-center gap-2 bg-slate-50 p-2 rounded-lg border border-slate-200">
                        <i className="fas fa-search text-slate-400"></i>
                        <input type="text" placeholder="Cari bahan..." className="p-1 border-none bg-transparent outline-none text-sm w-32 md:w-48" value={inventorySearch} onChange={e => setInventorySearch(e.target.value)} />
                      </div>
                      <div className="flex items-center gap-2 bg-slate-50 p-2 rounded-lg border border-slate-200">
                        <label className="text-sm font-semibold text-slate-600">Bulan:</label>
                        <input type="month" min="2020-01" className="p-1 border-none bg-transparent outline-none font-bold text-slate-800" value={inventoryFilterMonth} onChange={e => setInventoryFilterMonth(e.target.value)} />
                      </div>
                      <button onClick={handleExportExcel} className="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg font-bold text-sm flex items-center gap-2 transition-colors">
                        <i className="fas fa-file-excel"></i> Excel
                      </button>
                      <button onClick={handleExportPDF} className="bg-sky-600 hover:bg-sky-700 text-white px-4 py-2 rounded-lg font-bold text-sm flex items-center gap-2 transition-colors">
                        <i className="fas fa-file-pdf"></i> Cetak PDF
                      </button>
                    </div>
                  </div>

                  <div className="overflow-x-auto overflow-y-auto max-h-[calc(100vh-250px)] min-h-[600px] rounded-lg border border-slate-200 shadow-inner">

                          <th className="p-3 text-center text-emerald-300">Harga (Rata-rata)</th>

                          <th className="p-3 text-center text-blue-300">Masuk (Beli)</th>

                          <th className="p-3 text-center text-orange-300">Keluar (Buang)</th>

                          <th className="p-3 text-center rounded-r-lg bg-violet-900 font-black text-white">Konversi</th>

                              title="Klik untuk melihat detail perhitungan"
                            >
                              Rp {formatNum(Math.round(item.price))}
                              <i className="fas fa-info-circle ml-2 text-emerald-400 text-[10px]"></i>
                            </td>
                            <td className="p-3 text-center text-slate-600 font-medium">{formatNum(item.stokAwal)}</td>
                            <td className="p-3 text-center text-blue-600 font-medium">{formatNum(item.masuk)}</td>
                            <td className="p-3 text-center text-emerald-600 font-medium">{formatNum(item.keluarSales)}</td>
                            <td className="p-3 text-center text-orange-600 font-medium">{formatNum(item.keluarAdjustments)}</td>
                            <td className={`p-3 text-center font-black ${item.stokAkhir < 0 ? 'text-red-500 bg-red-50' : 'text-slate-800 bg-emerald-50/30'}`}>{formatNum(item.stokAkhir)}</td>
                            {(() => {
                              const u = (item.unit || '').toLowerCase();
                              const customConv = customConversions.find(c => c.itemName === item.name);
                              let displayVal = null;
                              let displayUnit = '';
                              let isCustom = false;

                              if (customConv && customConv.baseQty > 0) {
                                displayVal = item.stokAkhir / customConv.baseQty;
                                displayUnit = customConv.packUnit;
                                isCustom = true;
                              } else {
                                const convMap = { kg: { factor: 1000, to: 'gram' }, gram: { factor: 0.001, to: 'kg' }, liter: { factor: 1000, to: 'ml' }, ml: { factor: 0.001, to: 'liter' } };
                                const conv = convMap[u];
                                if (conv) {
                                  displayVal = item.stokAkhir * conv.factor;
                                  displayUnit = conv.to;
                                }
                              }

                              return (
                                <td className="p-3 text-center text-xs bg-violet-50/30 relative group">
                                  {displayVal !== null ? (
                                    <>
                                      <span className={`font-bold ${isCustom ? 'text-pink-600' : 'text-violet-700'}`}>{formatNum(displayVal)}</span>{' '}
                                      <span className={`uppercase font-black text-[9px] ${isCustom ? 'text-pink-400' : 'text-violet-400'}`}>{displayUnit}</span>
                                    </>
                                  ) : (
                                    <span className="text-slate-400">-</span>

                                  <button onClick={() => {
