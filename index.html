                        <span className="font-semibold">Yield (Hasil Resep)</span>
                        <span className="font-bold">{formatNum(selectedPriceDetailItem.priceDetails.yieldData.qty)} {selectedPriceDetailItem.priceDetails.yieldData.unit}</span>
                      </div>
                      <div className="p-4 bg-emerald-600 text-white rounded-xl shadow-inner text-center">
                        <p className="text-2xl font-black">Rp {formatNum(Math.round(selectedPriceDetailItem.price))}</p>
                        <p className="text-sm opacity-90 mb-1">Harga Per Satuan ({selectedPriceDetailItem.unit})</p>
                        <p className="text-xs opacity-80 mt-2">Rumus: Total HPP ÷ Hasil Resep</p>
                      </div>
                    </div>
                  )}

                  {selectedPriceDetailItem.priceDetails.type === 'avg_2_months' && (
                    <div className="space-y-4">
                      <div className="bg-blue-50 text-blue-800 p-4 rounded-xl text-sm border border-blue-100">
                        <i className="fas fa-info-circle mr-2"></i> Harga dihitung dari <strong>Rata-rata Pembelian 2 Bulan Penuh Sebelumnya</strong> (tidak termasuk bulan berjalan).
                      </div>
                      <div className="border border-slate-200 rounded-xl overflow-hidden">
                        <table className="w-full text-sm">
                          <thead className="bg-slate-100 text-slate-700">
                            <tr>
                              <th className="p-3 text-left">Tanggal</th>
                              <th className="p-3 text-right">Kuantitas</th>
                              <th className="p-3 text-right">Total Biaya</th>
                            </tr>
                          </thead>
                          <tbody className="divide-y divide-slate-100">
                            {selectedPriceDetailItem.priceDetails.transactions.map((trx, i) => (
                              <tr key={i} className="hover:bg-slate-50">
                                <td className="p-3">{new Date(trx.date).toLocaleDateString('id-ID')}</td>
                                <td className="p-3 text-right font-medium">{formatNum(trx.quantity)} {selectedPriceDetailItem.unit}</td>
                                <td className="p-3 text-right font-medium">Rp {formatNum(trx.totalPrice)}</td>
                              </tr>
                            ))}
                          </tbody>
                          <tfoot className="bg-slate-50 font-bold border-t-2 border-slate-200">
                            <tr>
                              <td className="p-3 text-right">TOTAL</td>
                              <td className="p-3 text-right text-emerald-600">{formatNum(selectedPriceDetailItem.priceDetails.totalQty)} {selectedPriceDetailItem.unit}</td>
                              <td className="p-3 text-right text-emerald-600">Rp {formatNum(selectedPriceDetailItem.priceDetails.totalCost)}</td>
                            </tr>
                          </tfoot>
                        </table>
                      </div>
                      <div className="p-4 bg-blue-600 text-white rounded-xl shadow-inner text-center">
                        <p className="text-sm opacity-90 mb-1">Harga Rata-rata per Satuan</p>
                        <p className="text-2xl font-black">Rp {formatNum(Math.round(selectedPriceDetailItem.price))}</p>
                        <p className="text-xs opacity-80 mt-2">Rumus: Total Biaya ÷ Total Kuantitas</p>
                      </div>
                    </div>
                  )}

                  {selectedPriceDetailItem.priceDetails.type === 'latest_fallback' && (
                    <div className="space-y-4">
                      <div className="bg-orange-50 text-orange-800 p-4 rounded-xl text-sm border border-orange-100">
                        <i className="fas fa-exclamation-triangle mr-2"></i> Tidak ada pembelian dalam 2 bulan terakhir. Harga menggunakan <strong>Riwayat Pembelian Terakhir</strong>.
                      </div>
                      <div className="flex justify-between items-center p-4 bg-slate-50 rounded-xl border border-slate-200">
                        <span className="font-semibold text-slate-600">Tanggal Transaksi</span>
                        <span className="font-bold">{new Date(selectedPriceDetailItem.priceDetails.transactions[0].date).toLocaleDateString('id-ID')}</span>
                      </div>
                      <div className="flex justify-between items-center p-4 bg-slate-50 rounded-xl border border-slate-200">
                        <span className="font-semibold text-slate-600">Kuantitas & Biaya</span>
                        <span className="font-bold">{formatNum(selectedPriceDetailItem.priceDetails.totalQty)} {selectedPriceDetailItem.unit} = Rp {formatNum(selectedPriceDetailItem.priceDetails.totalCost)}</span>
                      </div>
                      <div className="p-4 bg-orange-500 text-white rounded-xl shadow-inner text-center">
                        <p className="text-sm opacity-90 mb-1">Harga Historis per Satuan</p>
                        <p className="text-2xl font-black">Rp {formatNum(selectedPriceDetailItem.price)}</p>
                      </div>
                    </div>
                  )}

                  {selectedPriceDetailItem.priceDetails.type === 'no_data' && (
                    <div className="text-center p-8">
                      <div className="text-slate-300 mb-4"><i className="fas fa-box-open text-6xl"></i></div>
                      <h4 className="text-lg font-bold text-slate-700">Belum Ada Data Pembelian</h4>
                      <p className="text-sm text-slate-500 mt-2">Silakan catat pembelian untuk bahan ini terlebih dahulu di Tab "Input Belanja".</p>
                    </div>
                  )}
                </div>
              </div>
            </div>
          )}
          {/* Modal Konversi Kemasan */}
          {showConversionModal && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex justify-center items-center p-4 z-50 print-hide animate-fade-in">
              <div className="bg-white rounded-2xl w-full max-w-md shadow-2xl overflow-hidden animate-slide-up">
                <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-violet-50">
                  <div>
                    <h3 className="text-xl font-bold text-violet-800">Atur Konversi Stok</h3>
                    <p className="text-sm text-violet-600 mt-1">{editingConversionItem}</p>
                  </div>
                  <button onClick={() => setShowConversionModal(false)} className="w-8 h-8 flex items-center justify-center rounded-full bg-violet-200 hover:bg-violet-300 text-violet-700 transition-colors">
                    <i className="fas fa-times"></i>
                  </button>
                </div>
                <div className="p-6">
                  <form onSubmit={handleSaveConversion} className="space-y-4">
                    <div className="bg-blue-50 p-4 rounded-xl text-sm text-blue-800 mb-6 border border-blue-100">
                      Tentukan isi satuan dasar untuk setiap 1 kemasan. Misalnya: 1 <strong>Botol</strong> = 1000 <strong>ml</strong>, atau 1 <strong>Karung</strong> = 25000 <strong>gram</strong>.
                    </div>
                    <div className="flex items-end gap-3">
                      <div className="flex-1">
                        <label className="text-sm font-semibold mb-1 block text-slate-700">Satuan Kemasan</label>
                        <input type="text" placeholder="Cth: Botol, Karung" className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:border-violet-500 font-bold" value={newConversion.packUnit} onChange={e => setNewConversion({ ...newConversion, packUnit: e.target.value })} required />
                      </div>
                      <div className="pb-3 font-black text-slate-400">=</div>
                      <div className="flex-1">
                        <label className="text-sm font-semibold mb-1 block text-slate-700">Isi (Satuan Dasar)</label>
                        <input type="text" inputMode="decimal" placeholder="Cth: 1000" className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:border-violet-500 font-bold" value={newConversion.baseQty} onChange={e => setNewConversion({ ...newConversion, baseQty: formatQtyInput(e.target.value) })} required />
                      </div>
                    </div>
                    <div className="pt-4 flex gap-3">
                      {customConversions.find(c => c.itemName === editingConversionItem) && (
                        <button type="button" onClick={() => {
                          setCustomConversions(customConversions.filter(c => c.itemName !== editingConversionItem));
                          sendApiRequest('deleteConversion', { itemName: editingConversionItem });
                          setShowConversionModal(false);
                        }} className="w-full bg-red-100 hover:bg-red-200 text-red-600 p-3 rounded-xl font-bold flex justify-center items-center gap-2 transition-colors">
                          <i className="fas fa-trash"></i> Hapus Konversi
                        </button>
                      )}
                      <button type="submit" className="w-full bg-violet-600 hover:bg-violet-700 text-white p-3 rounded-xl font-bold flex justify-center items-center gap-2 transition-colors">
                        <i className="fas fa-save"></i> Simpan
                      </button>
                    </div>
                  </form>
                </div>
              </div>
            </div>
          )}
          <br />

          {/* TAB 7: PENGATURAN AKUN (USERS) */}
          {activeTab === 'users' && userRole === 'admin' && (
            <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 animate-fade-in">
              <div className="flex justify-between items-center mb-6 border-b pb-4">
                <h2 className="text-xl font-bold flex items-center gap-2 text-blue-800">
                  <i className="fas fa-users-cog"></i> Pengaturan Akun Pengguna
                </h2>
                <button onClick={() => {
                  setEditingUser(null);
                  setNewUser({ username: '', password: '', role: 'admin' });
                  setShowUserModal(true);
                }} className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-bold shadow-md transition-colors flex items-center gap-2">
                  <i className="fas fa-user-plus"></i> Tambah Akun
                </button>
              </div>

              <div className="overflow-x-auto rounded-xl border border-slate-200">
                <table className="w-full text-sm text-left">
                  <thead className="bg-slate-100 text-slate-700">
                    <tr>
                      <th className="p-4 rounded-tl-xl font-bold">Username</th>
                      <th className="p-4 font-bold">Password</th>
                      <th className="p-4 font-bold">Role</th>
                      <th className="p-4 rounded-tr-xl font-bold text-center">Aksi</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-100">
                    {usersList.map((u, i) => (
                      <tr key={i} className="hover:bg-slate-50">
                        <td className="p-4 font-semibold">{u.username}</td>
                        <td className="p-4 text-slate-500">
                          <div className="flex items-center gap-2">
                            <span className="font-mono bg-slate-100 px-2 py-1 rounded text-xs">{u.password}</span>
                          </div>
                        </td>
                        <td className="p-4">
                          <span className={`px-2 py-1 rounded-full text-xs font-bold uppercase ${u.role === 'admin' ? 'bg-blue-100 text-blue-700' : 'bg-slate-200 text-slate-700'}`}>
                            {u.role}
                          </span>
                        </td>
                        <td className="p-4 text-center">
                          <div className="flex justify-center gap-2">
                            <button onClick={() => {
                              setEditingUser(u);
                              setNewUser({ username: u.username, password: u.password, role: u.role });
                              setShowUserModal(true);
                            }} className="text-blue-500 hover:text-blue-700 bg-blue-50 hover:bg-blue-100 p-2 rounded-lg transition-colors" title="Edit Akun">
                              <i className="fas fa-edit"></i>
                            </button>
                            <button onClick={() => handleDeleteUser(u.id)} className="text-red-500 hover:text-red-700 bg-red-50 hover:bg-red-100 p-2 rounded-lg transition-colors ml-10" title="Hapus Akun">
                              <i className="fas fa-trash-alt"></i>
                            </button>
                          </div>
                        </td>
                      </tr>
                    ))}
                    {usersList.length === 0 && (
                      <tr>
                        <td colSpan="4" className="text-center p-8 text-slate-500">Belum ada data pengguna (memuat...).</td>
                      </tr>
                    )}
                  </tbody>
                </table>
              </div>

              <div className="mt-4 bg-blue-50 p-4 rounded-xl border border-blue-100 text-sm text-blue-800">
                <i className="fas fa-info-circle mr-2"></i> Role <strong>Admin</strong> memiliki akses penuh ke seluruh fitur dan pengaturan aplikasi. Saat ini, semua role diset sebagai admin untuk sementara.
              </div>
            </div>
          )}

          {/* Modal Tambah/Edit User */}
          {showUserModal && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex justify-center items-center p-4 z-50 animate-fade-in">
              <div className="bg-white rounded-2xl w-full max-w-md shadow-2xl overflow-hidden animate-slide-up">
                <div className="p-6 border-b border-slate-100 flex justify-between items-center bg-blue-50">
                  <h3 className="text-xl font-bold text-blue-800">
                    {editingUser ? 'Edit Akun' : 'Tambah Akun Baru'}
                  </h3>
                  <button onClick={() => setShowUserModal(false)} className="w-8 h-8 flex items-center justify-center rounded-full bg-blue-200 hover:bg-blue-300 text-blue-700 transition-colors">
                    <i className="fas fa-times"></i>
                  </button>
                </div>
                <div className="p-6">
                  <form onSubmit={handleSaveUser} className="space-y-4">
                    <div>
                      <label className="text-sm font-semibold mb-1 block text-slate-700">Username</label>
                      <input type="text" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-500 font-medium" value={newUser.username} onChange={e => setNewUser({ ...newUser, username: e.target.value })} required placeholder="Misal: staff_dapur" />
                    </div>
                    <div>
                      <label className="text-sm font-semibold mb-1 block text-slate-700">Password</label>
                      <input type="text" className="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-blue-500 font-medium" value={newUser.password} onChange={e => setNewUser({ ...newUser, password: e.target.value })} required placeholder="Kata sandi..." />
                    </div>
                    <div>
                      <label className="text-sm font-semibold mb-1 block text-slate-700">Role (Hak Akses)</label>
                      <CustomSelect 
                        className="py-3 px-4 bg-slate-50 font-medium"
                        value={newUser.role} 
                        onChange={val => setNewUser({ ...newUser, role: val })}
                        options={[
                          { label: 'Admin', value: 'admin' },
                          { label: 'Staff', value: 'staff' }
                        ]}
                      />
                    </div>
                    <div className="pt-4 flex gap-3">
                      <button type="button" onClick={() => setShowUserModal(false)} className="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 p-3 rounded-xl font-bold transition-colors">
                        Batal
                      </button>
                      <button type="submit" className="flex-1 bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-xl font-bold flex justify-center items-center gap-2 transition-colors">
                        <i className="fas fa-save"></i> Simpan
                      </button>
                    </div>
                  </form>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
